storage-limit-label=最大保管量：
storage-limit-tooltip=ドローン数に関わらず、このデポが要求するアイテムの総数を制限します。空欄はデフォルト動作（ドローン数×容量）。回路ライターでも設定可能。
ignore-capacity-label=容量研究を無視
ignore-capacity-tooltip=有効にすると、ドローンは基本容量（1スタック）のみ運搬し、容量研究ボーナスを無視します。
full-stack-only-label=フルスタックのみ
full-stack-only-tooltip=有効にすると、ドローンは供給デポからフルスタック分のみ回収します。少量の部分配送を防ぎます。
quality-label=品質:
quality-tooltip=道路ネットワークからリクエストするアイテムの品質を選択します。
transfer-to-depot-label=アイテム転送:
transfer-to-depot-tooltip=一致するアイテムをインベントリからこのデポに転送します。
transfer-all-to-depot=全て
transfer-all-to-depot-tooltip=一致する全てのアイテムをインベントリからこのデポに転送します。
transfer-stack-to-depot=x1
transfer-stack-to-depot-tooltip=一致するアイテムを1スタック分インベントリからこのデポに転送します。

channel-label=チャンネル:
channel-tooltip=ネットワーク分離用のビットマスクチャンネル。デポはチャンネルが少なくとも1ビットを共有する場合のみ相互作用します（ビットAND ≠ 0）。\n\n-1 = 全チャンネル（デフォルト）\n1, 2, 4, 8... = 個別チャンネル\n3 = チャンネル1 + 2\n\nLTNのネットワークIDと同様です。

allow-central-dispatch-label=中央配送を許可
allow-central-dispatch-tooltip=有効にすると、ドローンディスパッチャーがこのデポと連携できます - 供給/アクティブデポからアイテムを回収、またはリクエスト/バッファ/ストレージデポにアイテムを配送します。無効にすると、自身のドローン運用を維持しながら中央配送から除外します。

supply-threshold-label=供給しきい値：
supply-threshold-tooltip=この数のアイテムをデポに予約します。しきい値を超えた分のみが道路ネットワークに提供されます。空欄で予約なし。回路ライターで [virtual-signal=signal-T] シグナルを使って設定することもできます。

allow-bots-label=ロジスティクスロボットを許可
allow-bots-tooltip=有効にすると、パッシブ供給チェストとして機能し、ロジスティクスロボットがアイテムを取り出せます。
allow-bots-tooltip-locked=輸送ロジスティクスの研究が必要です。

fluid-mode-label=液体モード
fluid-mode-tooltip=有効にすると、デポはチェストのアイテムではなく、南側パイプの液体をプッシュします。液体を供給するためにパイプを接続してください。
fluid-mode-confirm-title=モード切替の確認
fluid-mode-confirm-message=デポにはまだ現在のモードのアイテムまたは流体が含まれています。切り替えるとそれらは失われます。続行しますか？
fluid-mode-confirm-yes=確認
fluid-mode-confirm-no=キャンセル

storage-filter-label=ストレージフィルター:
storage-filter-tooltip=このデポをフィルターするアイテムまたは液体を選択します。選択したタイプのみ保管できます。アクティブデポは一致するアイテムをこのデポに送ります。

multi-pipe-label=追加パイプ接続
multi-pipe-tooltip=有効にすると、デポのストレージに東西のパイプ接続を追加します。より多くのパイプを接続して並列の液体入出力が可能になります。
multi-pipe-tooltip-fluid=追加パイプ接続を使用するには、まず液体モードを有効にしてください。
multi-pipe-tooltip-locked=マルチパイプ接続の研究が必要です。

