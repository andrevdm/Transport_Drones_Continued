[mod-setting-description]
transport-depot-update-interval=各デポが更新ロジックを実行する頻度（tick数）。低い値 = より応答性が高いがUPS消費増加。デフォルト：60 tick（1秒）。
fuel-fluid=輸送ドローンの燃料として使用される液体。すべての燃料デポはこの液体を供給する必要があります。
fuel-amount-per-drone=ドローン派遣ごとに消費される燃料量。高い値はトリップあたりの燃料消費を増加させます。
drone-fluid-capacity=燃料ドローンが1回の配送で運搬できる最大燃料量。
fluid-depot-capacity=液体デポの最大液体貯蔵容量。容量が大きいほど、デポが満杯になる前により多くのドローンを派遣できます。バニラの貯蔵タンクは25,000を参考にしてください。再起動が必要です。
request-depot-fluid-capacity=リクエストデポの液体出力バッファ容量。値が大きいほど、接続されたパイプへのスループットが向上します。バニラの貯蔵タンクは25,000を参考にしてください。再起動が必要です。
fuel-consumption-per-meter=輸送ドローンが1メートルあたりに消費する燃料。0に設定すると燃料消費を無効にします。
drone-pollution-per-second=各アクティブドローンが1秒あたりに排出する汚染量。0に設定するとドローンの汚染を無効にします。
transport-drone-pathfinder-max-steps=tick当たりの経路探索最大ステップ数。高い値はドローンの経路を改善しますがUPSを消費します。Factorioデフォルト：1000。
transport-drone-pathfinder-max-work=tick当たりの経路探索最大作業量。高い値はドローンの経路を改善しますがUPSを消費します。Factorioデフォルト：8000。
transport-drone-pathfinder-use-cache=グローバル経路探索のパスキャッシュを有効にします。無効にするとより正確ですがコストの高い経路探索を行います。Factorioデフォルト：有効。
transport-drone-sound-volume=輸送ドローンのエンジン音の音量（0 = 無音、100 = デフォルト）。
transport-drones-road-tile-whitelist=サードパーティタイルをドローン道路として扱うためのカンマ区切りパターン。通常のエントリはアイテム名（Luaパターン）に、@付きエントリはサブグループに一致します。デフォルト: ^Arci%-,^dect%-concrete%-grid$,@py-tiles。再起動が必要です。
transport-drones-diagonal-check=有効にすると、ドローンは非道路タイル間の斜め角を通過できなくなります。隙間を通るショートカットを防止します。再起動が必要です。
transport-drone-load-balance-threshold=最良のスコアとの差がこのしきい値内の供給デポは同等として扱われ、ランダムに選択されます。近隣デポ間で負荷を分散します。0に設定すると常に最良のデポを選択します。
transport-drone-priority-weight=0より大きい場合、絶対優先度システムを重み付きバイアスに置き換えます：優先度×重み。優先度は距離によって覆される柔軟な優先設定になります。0 = 絶対優先度（デフォルト動作）。
transport-drone-max-dispatches-per-tick=1つのデポが1回の更新サイクルで派遣できるドローンの最大数。極端な状況での暴走派遣を防ぐ安全キャップです。通常のプレイでは、自然な制限（ドローン在庫、燃料）がこの上限よりはるかに早く派遣を停止します。デポあたり数百のドローンを持つ大規模メガベースの場合は値を増やしてください。
transport-drone-redispatch-interval=保留中の需要があるデポが通常の更新サイクル間で再派遣を試みる頻度（tick数）。低い値 = より滑らかなドローン生成、わずかにUPS増加。デフォルト5 tick = 毎秒12回の派遣試行。最大の応答性には1に設定してください。
transport-drones-space-platform-roads=宇宙プラットフォームの基盤に道路タイルを配置できるようにします。他のMODが基盤上へのタイル配置を防ぐ必要がある場合は無効にしてください。再起動が必要です。
active-depot-overfill-percent=アクティブデポが要求デポの通常の保管限度を超えて充填できるパーセンテージ。25%の場合、上限200のアイテムの要求デポはアクティブデポから最大250まで受け取れます。0に設定すると厳密な制限が適用されます。要求デポ自身のドローンは通常の上限を守ります。
enable-drone-dispatcher=有効にすると、ドローンディスパッチャー建物が利用可能になります（輸送システム研究で解除）。無効にするとゲームからディスパッチャーが削除されます。再起動が必要です。
enable-active-depot=有効にすると、アクティブデポ建物が利用可能になります（アクティブ輸送研究で解除）。無効にするとゲームからアクティブデポが削除されます。再起動が必要です。
enable-storage-depot=有効にすると、ストレージデポ建物が利用可能になります（アクティブ輸送研究で解除）。無効にするとゲームからストレージデポが削除されます。再起動が必要です。
enable-multi-pipe=有効にすると、マルチパイプ接続技術が利用可能になり、液体デポに東西の追加パイプ接続が解放されます。再起動が必要です。
transport-drone-stack-size=インベントリスタックあたりの輸送ドローン数。デポのドローンインベントリに収まるドローン数に影響します。再起動が必要です。
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

