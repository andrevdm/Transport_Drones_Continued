dispatcher-desc=青いスロットにドローンを入れてください。ディスパッチャーは不足しているデポにドローンを送り、余剰分を回収します。赤いスロットは帰還ドローン用で、優先的に配送されます。
central-dispatch-label=中央配送
central-dispatch-tooltip=有効にすると、ディスパッチャーが自らのドローンを使い、供給/アクティブデポからアイテムを回収して、需要のあるリクエスト/バッファ/ストレージデポに配送します。
