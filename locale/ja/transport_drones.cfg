[item-description]
transport-drone=道路ネットワーク上のデポ間でアイテムを輸送します。\n[font=default-bold]品質ボーナス:[/font]\n  速度: +15% 上質、+30% レア、+50% エピック、+80% レジェンダリー。\n  燃料節約: 10% 上質、20% レア、30% エピック、45% レジェンダリー。

[entity-description]
request-depot=道路ネットワークの供給デポからアイテムを回収するためにドローンを派遣します。\n[font=default-bold]品質:[/font] ドローンスロット: 5/6/7/8/10。
supply-depot=インベントリを道路ネットワークに提供します。\n[font=default-bold]品質:[/font] インベントリ: 80/100/125/175/250 スロット。
supply-depot-chest=インベントリを道路ネットワークに提供します。オプションでロジスティクスロボットによるアイテム取り出しを許可できます（パッシブ供給）。\n[font=default-bold]品質:[/font] インベントリ: 80/100/125/175/250 スロット。
buffer-depot=要求デポと供給デポの両方として機能します。\n[font=default-bold]品質:[/font] ドローンスロット: 5/6/7/8/10。
fuel-depot=道路ネットワーク内の他のデポに燃料を配達します。\n[font=default-bold]品質:[/font] ドローンスロット: 5/6/7/8/10。
active-depot=インベントリ内のアイテムを道路ネットワークの要求デポに能動的に配送します。レシピ不要 - ベルトやインサーターでアイテムを投入してください。\n[font=default-bold]品質:[/font] インベントリ: 80/100/125/175/250 スロット。ドローンスロット: 5/6/7/8/10。
active-depot-chest=アクティブデポの内部ストレージ。ここに投入されたアイテムは自動的に要求デポに配送されます。
storage-depot=道路ネットワークのパッシブ倉庫。要求デポは供給デポと同様にアイテムを取得します。アクティブデポは余剰アイテムをここに送ります。\n[font=default-bold]品質:[/font] インベントリ: 80/100/125/175/250 スロット。
storage-depot-chest=道路ネットワークのパッシブ倉庫。要求デポは供給デポと同様にアイテムを取得します。アクティブデポは余剰アイテムをここに送ります。\n[font=default-bold]品質:[/font] インベントリ: 80/100/125/175/250 スロット。
fluid-depot=液体インベントリを道路ネットワークに提供します。
transport-depot-reader=デポ内容またはネットワーク供給を回路信号として出力します。GUIでデポ内容、全ネットワーク供給、またはこのデポを除外したネットワーク供給を切り替えます。
transport-depot-writer=回路またはロジスティクス条件で接続されたデポを制御します。要求/バッファデポの要求数を上書きすることもできます。ワイヤーから [virtual-signal=signal-P] を読み取り、デポの優先度を上書きします。[virtual-signal=signal-T] を読み取り、供給しきい値を上書きします。
road-network-reader=道路ネットワーク内のすべての供給デポにある選択されたアイテムの合計数を読み取ります。複数の信号を同時にサポートします。
road-network-reader-filtered=接続されたデポの在庫を除外して、道路ネットワーク内の総供給量を読み取ります。供給デポまたはバッファデポの隣に配置してください。回路のフィードバックループを防止します。
depot-drone-chest=このデポの輸送ドローンを格納します。スロット数はデポの品質に応じて増加します。ロジスティクスロボットによる配達に対応。
drone-dispatcher=インサーターやロボットでドローンを受け入れます。道路ネットワークに接続してドローンを配分します。\n[font=default-bold]品質:[/font] インベントリ: 10/12/14/16/20 スロット。
drone-dispatcher-chest=インサーターやロボットでドローンを受け入れます。道路ネットワークに接続してドローンを配分します。\n[font=default-bold]品質:[/font] インベントリ: 10/12/14/16/20 スロット。

