[transport_drones_pages]
welcome-1=Transport Dronesへようこそ！\nTransport Dronesは、工場内で資材を移動する新しい方法を追加するMODです。
fuel-depot-1=道路ネットワーク内のすべての輸送には燃料が必要です。燃料は[font=default-bold]燃料デポ[/font]が配達します。\n\n操作は簡単です：\n - 燃料デポを道路ネットワーク上に設置します。\n - 燃料を接続します。\n - 輸送ドローンを追加します。\n\n燃料デポがドローンを派遣し、ネットワーク内の他のデポに燃料を届けます。
drones-1=[font=default-bold]輸送ドローン[/font]はデポ間で資材を輸送するエージェントです。各ドローンは1つのデポにのみ割り当てられます。動作には燃料が必要で、移動中は汚染を発生させます。
request-depot-1=道路ネットワークでアイテムを移動するには[font=default-bold]要求デポ[/font]を使用します。要求されたアイテムを持つ最寄りの供給デポにドローンを派遣します。\n回収するアイテム数は要求デポ内のドローン数に依存します。各ドローンがその積載量分だけ要求量を増やします。\n\n    例1: ドローンが1スタック運搬可能（アップグレードなし）で5体のドローンを配置すると、インベントリに5スタック集まるまでドローンを派遣します。\n    例2: ドローンが2スタック運搬可能（容量アップグレード1回）で10体配置すると、20スタック集まるまで派遣します。\n\nこのようにドローン数やデポ間距離などを考慮して要求量を調整できます。要求数は回路ライターで上書きすることも可能です。\n\n優先度パネルの追加コントロール:\n - [font=default-bold]最大保管量[/font]: ドローン数に関わらず、デポが要求するアイテムの総数を制限します。\n - [font=default-bold]容量研究を無視[/font]: ドローンは基本容量（1スタック）のみ運搬し、研究ボーナスを無視します。\n - [font=default-bold]フルスタックのみ[/font]: ドローンはフルスタック分のみ回収し、少量の部分配送を防ぎます。\n\n要求デポの設定は簡単です：\n - 要求デポを道路ネットワーク上に設置します。\n - 要求するアイテムを選択します。\n - 輸送ドローンを投入します。\nデポはまずネットワークから燃料を要求します。燃料が届いたら、要求アイテムの回収のためドローンを派遣し始めます。
supply-depot=[font=default-bold]供給デポ[/font]（および液体デポ）は道路ネットワークの受動的な参加者です。その内容を要求デポに提供します。
road-network=[font=default-bold]道路ネットワーク[/font]はデポ同士を接続し、ドローンが走行する道路のシステムです。道路タイルを敷くだけで構築できます。接続されたタイルはすべて同じネットワークの一部になります。切断された2つのエリアは別々のネットワークとなり、デポは互いに供給しません。
buffer-depot=[font=default-bold]バッファデポ[/font]は要求デポと供給デポの両方として機能します。\n\n遠方の前哨基地から鉱石を集め、近くの多数の要求デポに分配するのに適しています。バッファデポに多数のドローンを配置し、近くの要求デポは短距離用に1〜2体だけで済みます。
circuit-connectors=回路コネクタはデポや道路ネットワークへの信号の読み書きを行う手段です。ロジスティクス条件や回路ネットワークロジックを使ってデポの動作を制御できます。
depot-reader=[font=default-bold]輸送デポリーダー[/font]は接続されたデポのデータを読み取ります。\n\n出力モード:\n- [font=default-bold]デポ内容[/font]: デポに保管されているアイテムまたは液体。\n- [font=default-bold]ネットワーク供給[/font]: ネットワーク内の全供給デポの合計量。\n- [font=default-bold]ネットワーク供給(デポ除外)[/font]: 同上ですが接続デポを除外。\n\n追加信号を有効にできます: ドローン数、稼働中ドローン、燃料、容量、スタック情報。
depot-writer=[font=default-bold]輸送デポライター[/font]は回路やロジスティクス条件に基づいてデポを有効/無効にできます。\n    例1: 要求デポを無効にすると、ドローンの派遣が停止します。\n    例2: 供給デポを無効にすると、アイテムがネットワークに提供されなくなります。
transport-depots=輸送デポは道路ネットワーク内でアイテムと液体の輸送を調整するエンティティです。ネットワークの内容と要求を管理します。地面の「注意」プレートを通じてネットワークに接続し、そこからドローンが発着します。
network-reader=[font=default-bold]道路ネットワークリーダー[/font]は接続された道路ネットワークの内容を読み取れます。リーダーを開いて、スロットに1つ以上のアイテム/液体信号を設定してください。リーダーはネットワーク内のすべての供給デポにおける各アイテムの合計数を継続的に更新します。\n\n複数の信号を同時に監視できます - 各スロットが異なるアイテムを独立して追跡します。\n\nこれにより、例えばネットワーク内の鉱石が一定値を下回った場合に生産ラインを有効/無効にしたり、予備倉庫を有効にしたりできます。
filtered-reader=[font=default-bold]道路ネットワークリーダー（デポを除く）[/font]は標準の道路ネットワークリーダーと同様に機能しますが、接続されたデポの在庫を合計から除外します。\n\nネットワーク供給を使用して供給デポを制御する際のフィードバックループを防止します。例えば、ネットワークに十分なアイテムがある時にデポを無効にしたい場合、このリーダーを使ってデポ自身のアイテムを合計に含めないようにできます。\n\nデポリーダー/ライターと同様に、デポの隣に方向をデポに向けて配置してください。

