supply-threshold-label=Umbral de suministro:
supply-threshold-tooltip=Reserva esta cantidad de objetos en el depósito. Solo el exceso por encima del umbral se ofrece a la red vial. Dejar vacío para no reservar. También se puede configurar mediante un escritor de circuito usando la señal [virtual-signal=signal-T].

allow-bots-label=Permitir robots logísticos
