[transport_drones_pages]
welcome-1=¡Bienvenido a Transport Drones!\nTransport Drones es un mod que introduce un nuevo método para mover materiales por tu fábrica.
fuel-depot-1=Todo el transporte dentro de la red vial requiere combustible. El combustible es entregado por los [font=default-bold]Depósitos de combustible[/font].\n\nEl funcionamiento es simple:\n - Coloca un depósito de combustible en la red vial.\n - Conecta el combustible.\n - Añade drones de transporte.\n\nEl depósito de combustible enviará drones para abastecer otros depósitos de la red.
drones-1=Los [font=default-bold]drones de transporte[/font] son los agentes que transportan materiales entre depósitos. Solo se asignan a un único depósito. Necesitan combustible para funcionar y producen contaminación al desplazarse.
request-depot-1=Para mover objetos en la red vial se usan los [font=default-bold]Depósitos de solicitud[/font]. Estos envían drones al depósito de suministro más cercano con el objeto solicitado.\nLa cantidad de objetos recogidos depende del número de drones en el depósito. Cada dron aumenta la cantidad solicitada según su capacidad.\n\n    Ejemplo 1: Si los drones cargan 1 pila (sin mejoras) y colocas 5 drones, el depósito enviará drones hasta tener 5 pilas en inventario.\n    Ejemplo 2: Si los drones cargan 2 pilas (1 mejora de capacidad) y colocas 10 drones, el depósito enviará drones hasta tener 20 pilas.\n\nAsí puedes ajustar la cantidad solicitada considerando el rendimiento necesario, la distancia, etc. La cantidad puede ser anulada por un escritor de circuitos.\n\nControles adicionales en el panel de Prioridad:\n - [font=default-bold]Almacenamiento máx.[/font]: Limita el total de objetos que el depósito solicitará, independientemente del número de drones.\n - [font=default-bold]Ignorar investigación de capacidad[/font]: Los drones transportan solo su capacidad base (1 pila), ignorando bonificaciones de investigación.\n - [font=default-bold]Solo pilas completas[/font]: Los drones solo recogerán pilas completas, evitando entregas parciales pequeñas.\n\nConfigurar un depósito de solicitud es simple:\n - Coloca el depósito en la red vial.\n - Selecciona el objeto a solicitar.\n - Inserta drones de transporte.\nEl depósito primero solicitará combustible de la red. Una vez abastecido, comenzará a enviar drones a recoger el objeto solicitado.
supply-depot=Los [font=default-bold]depósitos de suministro[/font] (y los depósitos de fluidos) son participantes pasivos de la red vial. Ponen su contenido a disposición de los depósitos de solicitud.
road-network=La [font=default-bold]red vial[/font] es el sistema que conecta los depósitos entre sí mediante carreteras por las que circulan los drones. Se construye simplemente con baldosas de carretera. Todas las baldosas conectadas forman la misma red. Dos áreas desconectadas son redes separadas cuyos depósitos no se abastecen mutuamente.
buffer-depot=El [font=default-bold]depósito intermedio[/font] funciona como depósito de solicitud y de suministro al mismo tiempo.\n\nUn buen uso es recoger minerales de puestos lejanos para distribuirlos a depósitos de solicitud cercanos. El depósito intermedio puede tener muchos drones, mientras que los cercanos solo necesitan 1 o 2 para el corto trayecto.
circuit-connectors=Los conectores de circuito permiten leer y escribir señales a los depósitos y la red vial. Permiten usar condiciones logísticas y lógica de red de circuitos para controlar el comportamiento de los depósitos.
depot-reader=El [font=default-bold]lector de deposito[/font] permite leer datos de cualquier deposito al que este conectado.\n\nModos de salida:\n- [font=default-bold]Contenido del deposito[/font]: los objetos o fluidos almacenados en el deposito.\n- [font=default-bold]Suministro de red[/font]: total disponible en todos los depositos de suministro de la red.\n- [font=default-bold]Suministro de red (excl. deposito)[/font]: igual pero excluye el deposito conectado.\n\nSe pueden activar senales adicionales: cantidad de drones, drones activos, combustible, capacidad e informacion de pilas.
depot-writer=El [font=default-bold]escritor de depósito[/font] permite activar y desactivar depósitos según condiciones de circuito o logísticas.\n    Ejemplo 1: Desactivar un depósito de solicitud detendrá el envío de drones.\n    Ejemplo 2: Desactivar un depósito de suministro impedirá que sus objetos estén disponibles en la red.
transport-depots=Los depósitos de transporte son las entidades de la red vial que coordinan el transporte de objetos y fluidos. Gestionan el contenido y las solicitudes de la red. Se conectan mediante la placa de 'precaución' en el suelo, desde donde se envían y reciben los drones.
network-reader=El [font=default-bold]lector de red vial[/font] puede leer el contenido de la red a la que está conectado. Abre el lector y configura una o más señales de objetos/fluidos en sus ranuras. El lector actualizará continuamente cada señal con la cantidad total de ese objeto disponible en todos los depósitos de suministro de la red.\n\nSe pueden monitorizar múltiples señales simultáneamente - cada ranura rastrea un objeto diferente de forma independiente.\n\nEsto permite, por ejemplo, activar o desactivar ciertas líneas de producción si la cantidad de mineral en la red baja de cierto valor, o activar un almacenamiento de reserva.
filtered-reader=El [font=default-bold]lector de red vial (excluyendo depósito)[/font] funciona como el lector de red vial estándar, pero excluye el inventario del depósito conectado de los totales.\n\nEsto previene bucles de retroalimentación al usar el suministro de la red para controlar un depósito de suministro. Por ejemplo, si quieres desactivar un depósito cuando la red tiene suficientes objetos, usa este lector para no contar los propios objetos del depósito en el total.\n\nColócalo junto a un depósito (como el lector/escritor de depósito) con la dirección apuntando hacia el depósito.

