[mod-setting-description]
transport-depot-update-interval=Frecuencia (en ticks) con la que cada depósito ejecuta su lógica de actualización. Valores más bajos = más reactivo pero mayor coste de UPS. Por defecto: 60 ticks (1 segundo).
fuel-fluid=El fluido utilizado como combustible para los drones de transporte. Todos los depósitos de combustible deben suministrar este fluido.
fuel-amount-per-drone=Cantidad de combustible consumida por envío de dron. Valores más altos aumentan el consumo por viaje.
drone-fluid-capacity=Cantidad máxima de combustible que un dron de combustible puede transportar por entrega.
fluid-depot-capacity=Capacidad máxima de almacenamiento de fluidos para depósitos de fluidos. Mayor capacidad permite enviar más drones antes de que el depósito esté lleno. Un tanque de almacenamiento estándar contiene 25.000 como referencia. Requiere reinicio.
request-depot-fluid-capacity=Capacidad del búfer de salida de fluido para depósitos solicitantes. Valores mayores aumentan el caudal hacia tuberías conectadas. Un tanque estándar contiene 25.000 como referencia. Requiere reinicio.
fuel-consumption-per-meter=Combustible consumido por metro recorrido por los drones. Establecer en 0 para desactivar el consumo.
drone-pollution-per-second=Contaminación emitida por segundo por cada dron activo. Establecer en 0 para desactivar la contaminación.
transport-drone-pathfinder-max-steps=Pasos máximos del buscador de rutas por tick. Valores más altos mejoran el enrutamiento de drones pero cuestan UPS. Valor predeterminado de Factorio: 1000.
transport-drone-pathfinder-max-work=Trabajo máximo del buscador de rutas por tick. Valores más altos mejoran el enrutamiento de drones pero cuestan UPS. Valor predeterminado de Factorio: 8000.
transport-drone-pathfinder-use-cache=Activar el caché de rutas del buscador global. Desactivar para un enrutamiento más preciso pero más costoso. Valor predeterminado de Factorio: activado.
transport-drone-sound-volume=Volumen del sonido del motor de los drones de transporte (0 = silencio, 100 = predeterminado).
transport-drones-road-tile-whitelist=Patrones separados por comas para baldosas de terceros a tratar como carreteras de drones. Las entradas simples coinciden con nombres de objetos (patrones Lua), las entradas con @ coinciden con subgrupos. Por defecto: ^Arci%-,^dect%-concrete%-grid$,@py-tiles. Requiere reinicio.
transport-drones-diagonal-check=Cuando está activado, los drones no pueden cortar por esquinas diagonales entre baldosas sin carretera. Previene atajos a través de huecos. Requiere reinicio.
transport-drone-load-balance-threshold=Los depósitos de suministro con puntuaciones dentro de este umbral respecto al mejor se tratan como equivalentes y se elige uno al azar. Distribuye la carga entre depósitos cercanos. Establecer en 0 para siempre elegir el mejor depósito.
transport-drone-priority-weight=Cuando es mayor que 0, reemplaza el sistema de prioridad absoluta con un sesgo ponderado: prioridad × peso. La prioridad se convierte en una preferencia flexible que puede ser superada por la distancia. 0 = prioridad absoluta (comportamiento predeterminado).
transport-drone-max-dispatches-per-tick=Número máximo de drones que un solo depósito puede enviar por ciclo de actualización. Actúa como límite de seguridad contra envíos descontrolados. En juego normal, los límites naturales (inventario, combustible) detienen el envío mucho antes. Aumentar para megabases muy grandes.
transport-drone-redispatch-interval=Con qué frecuencia (en ticks) los depósitos con demanda pendiente reintentan el envío entre ciclos regulares. Valores más bajos = aparición más fluida de drones, ligeramente más UPS. Por defecto 5 ticks = 12 intentos por segundo. Establecer en 1 para máxima capacidad de respuesta.
transport-drones-space-platform-roads=Permite colocar baldosas de carretera sobre cimientos de plataformas espaciales. Desactivar si otro mod necesita impedir la colocación de baldosas sobre cimientos. Requiere reinicio.
active-depot-overfill-percent=Porcentaje por el cual los depósitos activos pueden sobrecargar los depósitos de solicitud más allá de su límite de almacenamiento normal. Al 25%, un solicitante con un tope de 200 objetos puede recibir hasta 250 desde depósitos activos. Establecer en 0 para límites estrictos. Los drones del solicitante siguen respetando el tope normal.
enable-drone-dispatcher=Cuando esta habilitado, el edificio despachador de drones esta disponible (desbloqueado con la investigacion Sistema de transporte). Desactivar para eliminar los despachadores del juego. Requiere reinicio.
enable-active-depot=Cuando esta habilitado, el edificio de deposito activo esta disponible (desbloqueado con la investigacion Transporte activo). Desactivar para eliminar los depositos activos del juego. Requiere reinicio.
enable-storage-depot=Cuando esta habilitado, el edificio de deposito de almacenamiento esta disponible (desbloqueado con la investigacion Transporte activo). Desactivar para eliminar los depositos de almacenamiento del juego. Requiere reinicio.
enable-multi-pipe=Cuando esta habilitado, la tecnologia de Conexiones de tuberias multiples esta disponible, desbloqueando conexiones de tuberia este/oeste adicionales en los depositos de fluidos. Requiere reinicio.
transport-drone-stack-size=Numero de drones de transporte por lote de inventario. Afecta cuantos drones caben en los inventarios de drones de los depositos. Requiere reinicio.
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

