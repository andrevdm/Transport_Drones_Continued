[item-description]
transport-drone=Transporta objetos entre depósitos en la red vial.\n[font=default-bold]Bonificaciones de calidad:[/font]\n  Velocidad: +15% poco común, +30% raro, +50% épico, +80% legendario.\n  Ahorro de combustible: 10% poco común, 20% raro, 30% épico, 45% legendario.

[entity-description]
request-depot=Envía drones a recoger objetos de los depósitos de suministro en la red vial.\n[font=default-bold]Calidad:[/font] Ranuras de drones: 5/6/7/8/10.
supply-depot=Pone su inventario a disposición de la red vial.\n[font=default-bold]Calidad:[/font] Inventario: 80/100/125/175/250 ranuras.
supply-depot-chest=Pone su inventario a disposición de la red vial. Opcionalmente permite que los robots logísticos tomen objetos (proveedor pasivo).\n[font=default-bold]Calidad:[/font] Inventario: 80/100/125/175/250 ranuras.
buffer-depot=Funciona como depósito de solicitud y de suministro al mismo tiempo.\n[font=default-bold]Calidad:[/font] Ranuras de drones: 5/6/7/8/10.
fuel-depot=Entrega combustible a otros depósitos en la red vial.\n[font=default-bold]Calidad:[/font] Ranuras de drones: 5/6/7/8/10.
active-depot=Envía activamente objetos de su inventario a depósitos de solicitud en la red vial. No requiere receta - inserte objetos mediante cintas o insertadores.\n[font=default-bold]Calidad:[/font] Inventario: 80/100/125/175/250 ranuras. Ranuras de drones: 5/6/7/8/10.
active-depot-chest=Almacenamiento interno del depósito activo. Los objetos insertados aquí se envían automáticamente a los depósitos de solicitud.
storage-depot=Almacen pasivo para la red vial. Los depositos de solicitud obtienen objetos como de un deposito de suministro. Los depositos activos envian objetos excedentes.\n[font=default-bold]Calidad:[/font] Inventario: 80/100/125/175/250 espacios.
storage-depot-chest=Almacen pasivo para la red vial. Los depositos de solicitud obtienen objetos como de un deposito de suministro. Los depositos activos envian objetos excedentes.\n[font=default-bold]Calidad:[/font] Inventario: 80/100/125/175/250 espacios.
fluid-depot=Pone sus fluidos a disposición de la red vial.
transport-depot-reader=Transmite el contenido del deposito o suministro de red como senales de circuito. Use la interfaz para alternar entre contenido del deposito, suministro de red completo o suministro de red excluyendo este deposito.
transport-depot-writer=Controla el depósito conectado mediante condiciones de circuito o logísticas. También puede anular la cantidad solicitada para depósitos de solicitud/intermedios. Lee [virtual-signal=signal-P] de los cables para anular la prioridad del depósito. Lee [virtual-signal=signal-T] para anular el umbral de suministro.
road-network-reader=Lee la cantidad total de los objetos seleccionados en todos los depósitos de suministro de la red vial. Soporta múltiples señales simultáneamente.
road-network-reader-filtered=Lee el suministro total en la red de carreteras, excluyendo el inventario del depósito conectado. Colocar junto a un depósito de suministro o búfer. Previene bucles de retroalimentación en circuitos.
depot-drone-chest=Almacena drones de transporte para este depósito. El número de ranuras aumenta con la calidad del depósito. Soporta entrega por robots logísticos.
drone-dispatcher=Acepta drones de transporte mediante insertadores o robots. Se conecta a la red vial para distribucion de drones.\n[font=default-bold]Calidad:[/font] Inventario: 10/12/14/16/20 espacios.
drone-dispatcher-chest=Acepta drones de transporte mediante insertadores o robots. Se conecta a la red vial para distribucion de drones.\n[font=default-bold]Calidad:[/font] Inventario: 10/12/14/16/20 espacios.

