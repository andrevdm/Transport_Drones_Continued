[mod-setting-description]
transport-depot-update-interval=Jak często (w tickach) każda zajezdnia wykonuje swoją logikę aktualizacji. Niższe wartości = szybsza reakcja, ale wyższy koszt UPS. Domyślnie: 60 ticków (1 sekunda).
fuel-fluid=Płyn używany jako paliwo dla dronów transportowych. Wszystkie zajezdnie paliwowe muszą dostarczać ten płyn.
fuel-amount-per-drone=Ilość paliwa zużywanego na każde wysłanie drona. Wyższe wartości zwiększają zużycie na podróż.
drone-fluid-capacity=Maksymalna ilość paliwa, jaką dron paliwowy może przewieźć na jedną dostawę.
fluid-depot-capacity=Maksymalna pojemność przechowywania płynów dla zajezdni płynów. Większa pojemność pozwala wysłać więcej dronów zanim zajezdnia się zapełni. Standardowy zbiornik magazynowy mieści 25 000 dla odniesienia. Wymaga restartu.
request-depot-fluid-capacity=Pojemność bufora wyjściowego płynów dla zajezdni zamówień. Większe wartości zwiększają przepustowość do podłączonych rur. Standardowy zbiornik mieści 25 000 dla odniesienia. Wymaga restartu.
fuel-consumption-per-meter=Paliwo zużywane na metr przez drony transportowe. Ustaw 0, aby wyłączyć zużycie paliwa.
drone-pollution-per-second=Zanieczyszczenie emitowane na sekundę przez każdego aktywnego drona. Ustaw 0, aby wyłączyć zanieczyszczenie dronów.
transport-drone-pathfinder-max-steps=Maksymalna liczba kroków wyszukiwacza ścieżek na tick. Wyższe wartości poprawiają trasowanie dronów, ale kosztują UPS. Domyślna wartość Factorio: 1000.
transport-drone-pathfinder-max-work=Maksymalna praca wyszukiwacza ścieżek na tick. Wyższe wartości poprawiają trasowanie dronów, ale kosztują UPS. Domyślna wartość Factorio: 8000.
transport-drone-pathfinder-use-cache=Włącz buforowanie ścieżek dla globalnego wyszukiwacza. Wyłącz, aby uzyskać dokładniejsze, ale kosztowniejsze wyszukiwanie. Domyślna wartość Factorio: włączona.
transport-drone-sound-volume=Głośność dźwięku silnika dronów transportowych (0 = cisza, 100 = domyślnie).
transport-drones-road-tile-whitelist=Wzorce oddzielone przecinkami dla kafelków z modów, które mają być traktowane jako drogi dronów. Zwykłe wpisy dopasowują nazwy przedmiotów (wzorce Lua), wpisy z @ dopasowują podgrupy. Domyślnie: ^Arci%-,^dect%-concrete%-grid$,@py-tiles. Wymaga restartu.
transport-drones-diagonal-check=Po włączeniu drony nie mogą przechodzić przez diagonalne narożniki między kafelkami bez drogi. Zapobiega skrótom przez luki. Wymaga restartu.
transport-drone-load-balance-threshold=Zajezdnie zaopatrzenia z wynikami w obrębie tego progu od najlepszego są traktowane jako równoważne i jedna jest wybierana losowo. Rozkłada obciążenie na pobliskie zajezdnie. Ustaw 0, aby zawsze wybierać najlepszą zajezdnię.
transport-drone-priority-weight=Gdy większe niż 0, zastępuje bezwzględny system priorytetów ważonym odchyleniem: priorytet × waga. Priorytet staje się miękką preferencją, która może być przezwyciężona przez odległość. 0 = bezwzględny priorytet (domyślne zachowanie).
transport-drone-max-dispatches-per-tick=Maksymalna liczba dronów, które pojedyncza zajezdnia może wysłać w jednym cyklu aktualizacji. Działa jako zabezpieczenie przed niekontrolowanym wysyłaniem w ekstremalnych sytuacjach. W normalnej grze naturalne limity (zapas dronów, paliwo) zatrzymują wysyłanie znacznie przed tym limitem. Zwiększ dla bardzo dużych megabaz z setkami dronów na zajezdnię.
transport-drone-redispatch-interval=Jak często (w tickach) zajezdnie z oczekującym zapotrzebowaniem ponownie próbują wysyłania między regularnymi cyklami aktualizacji. Niższe wartości = płynniejsze pojawianie się dronów, ale nieco więcej UPS. Domyślnie 5 ticków = 12 prób wysyłki na sekundę. Ustaw 1 dla maksymalnej responsywności.
transport-drones-space-platform-roads=Pozwala umieszczać drogowe kafelki na fundamentach platform kosmicznych. Wyłącz, jeśli inny mod musi zapobiegać umieszczaniu kafelków na fundamentach. Wymaga restartu.
active-depot-overfill-percent=Procent, o jaki zajezdnie aktywne mogą przepełnić zajezdnie zamówień powyżej ich normalnego limitu magazynowania. Przy 25% zajezdnia z limitem 200 przedmiotów może otrzymać do 250 z zajezdni aktywnych. Ustaw 0 dla ścisłych limitów. Własne drony zajezdni zamówień nadal respektują normalny limit.
enable-drone-dispatcher=Po wlaczeniu budynek dystrybutora dronow jest dostepny (odblokowany przez badanie System transportowy). Wylacz, aby usunac dystrybutory z gry. Wymaga restartu.
enable-active-depot=Po wlaczeniu budynek zajezdni aktywnej jest dostepny (odblokowany przez badanie Transport aktywny). Wylacz, aby usunac zajezdnie aktywne z gry. Wymaga restartu.
enable-storage-depot=Po wlaczeniu budynek zajezdni magazynowej jest dostepny (odblokowany przez badanie Transport aktywny). Wylacz, aby usunac zajezdnie magazynowe z gry. Wymaga restartu.
enable-multi-pipe=Po wlaczeniu technologia Polaczenia wielorurowe jest dostepna, odblokowujac dodatkowe wschodnie/zachodnie polaczenia rur na zajezdniach plynow. Wymaga restartu.
transport-drone-stack-size=Liczba dronow transportowych na stos inwentarza. Wplywa na to, ile dronow miesci sie w inwentarzach dronow magazynow. Wymaga restartu.
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

