priority-label=Priorytet:
priority-circuit-hint=Nadpisanie:
priority-desc-supply=Wyższy = zbierane w pierwszej kolejności
priority-desc-request=Wyższy = pierwszeństwo w zaopatrzeniu
priority-desc-fuel=Wyższy = dostawa paliwa w pierwszej kolejności
priority-desc-dispatcher=Wyższy = rozdziela drony jako pierwszy
dispatcher-desc=Umiesc drony w niebieskich polach. Dyspozytor wysyla je do magazynow, ktore potrzebuja wiecej, i zbiera nadmiarowe. Czerwone pola sa zarezerwowane dla powracajacych dronow i sa wysylane w pierwszej kolejnosci.
central-dispatch-label=Centralna wysylka
central-dispatch-tooltip=Po wlaczeniu dyspozytor wysyla wlasne drony po przedmioty z zajezdni zaopatrzenia/aktywnych i dostarcza je do zajezdni zamowien/buforowych/magazynowych z zapotrzebowaniem.
central-dispatch-slider-label=Przydzial dronow:
central-dispatch-slider-tooltip=Maksymalny procent dronow w inwentarzu dyspozytora, ktore moga byc uzyte do centralnej dostawy w danym momencie.

storage-limit-label=Maks. magazyn:
storage-limit-tooltip=Ogranicza łączną liczbę przedmiotów, które ta zajezdnia będzie zamawiać, niezależnie od liczby dronów. Pozostaw puste dla domyślnego zachowania (liczba dronów × pojemność). Można też ustawić przez pisarz obwodu.
ignore-capacity-label=Ignoruj badanie pojemności
ignore-capacity-tooltip=Po włączeniu drony przewożą tylko podstawową pojemność (1 stos), ignorując bonusy z badań pojemności.
full-stack-only-label=Tylko pełne stosy
full-stack-only-tooltip=Po włączeniu drony będą pobierać tylko pełne stosy z zajezdni zaopatrzenia. Zapobiega małym częściowym dostawom.
quality-label=Jakosc:
quality-tooltip=Wybierz jakosc przedmiotow do zamowienia z sieci drogowej.
transfer-to-depot-label=Przenies przedmioty:
transfer-to-depot-tooltip=Przenies pasujace przedmioty z ekwipunku do tego magazynu.
transfer-all-to-depot=Wszystko
transfer-all-to-depot-tooltip=Przenies wszystkie pasujace przedmioty z ekwipunku do tego magazynu.
transfer-stack-to-depot=x1
transfer-stack-to-depot-tooltip=Przenies jeden stos pasujacych przedmiotow z ekwipunku do tego magazynu.

channel-label=Kanał:
channel-tooltip=Kanał bitowy do segregacji sieci. Zajezdnie współdziałają tylko gdy ich kanały mają co najmniej jeden wspólny bit (AND bitowe ≠ 0).\n\n-1 = wszystkie kanały (domyślnie)\n1, 2, 4, 8... = oddzielne kanały\n3 = kanały 1 + 2\n\nPodobnie jak ID sieci LTN.

allow-central-dispatch-label=Zezwol na centralna dyspozycje
allow-central-dispatch-tooltip=Po wlaczeniu dyspozytor dronow moze wspoldzialac z ta zajezdnia - odbierac przedmioty z zajezdni zaopatrzenia/aktywnych lub dostarczac przedmioty do zajezdni zamowien/buforowych/magazynowych. Wylacz, aby wykluczyc ta zajezdnie z centralnej dyspozycji, zachowujac jej wlasne operacje dronow.

supply-threshold-label=Próg zaopatrzenia:
supply-threshold-tooltip=Rezerwuje tę liczbę przedmiotów w zajezdni. Tylko nadwyżka powyżej progu jest oferowana sieci drogowej. Pozostaw puste, aby nie rezerwować. Można też ustawić przez nadawcę obwodu używając sygnału [virtual-signal=signal-T].

allow-bots-label=Zezwól na roboty logistyczne
allow-bots-tooltip=Po włączeniu działa jako pasywny dostawca – roboty logistyczne mogą pobierać przedmioty z tej zajezdni.
allow-bots-tooltip-locked=Wymaga badania Logistyka transportu.

fluid-mode-label=Tryb plynow
fluid-mode-tooltip=Po wlaczeniu zajezdnia wysyla plyny z poludniowej rury zamiast przedmiotow ze skrzyni. Podlacz rure, aby dostarczyc plyn do wysylania.
fluid-mode-confirm-title=Potwierdz zmiane trybu
fluid-mode-confirm-message=Magazyn nadal zawiera przedmioty lub plyny z biezacego trybu. Zmiana je zniszczy. Kontynuowac?
fluid-mode-confirm-yes=Potwierdz
fluid-mode-confirm-no=Anuluj

storage-filter-label=Filtr magazynu:
storage-filter-tooltip=Wybierz przedmiot lub plyn do filtrowania tej zajezdni. Tylko wybrany typ moze byc przechowywany. Aktywne zajezdnie beda wysylac pasujace przedmioty do tej zajezdni.

multi-pipe-label=Dodatkowe polaczenia rur
multi-pipe-tooltip=Po wlaczeniu dodaje wschodnie i zachodnie polaczenia rur do zbiornika magazynowego zajezdni. Umozliwia podlaczenie wiekszej liczby rur dla rownoleglego przeplywu.
multi-pipe-tooltip-fluid=Najpierw wlacz tryb plynow, aby uzywac dodatkowych polaczen rur.
multi-pipe-tooltip-locked=Wymaga badania Polaczenia wielorurowe.

map-button-tooltip=Kliknij, aby przybliżyć widok na tę zajezdnię
drones-active-available-tooltip=Aktywne drony dostarczają przedmioty. Dostępne drony są bezczynne, gotowe do wysłania.
drone-bar-tooltip=__1__% dostępnych
dispatcher-user-bar-tooltip=Sloty wejsciowe: __1__ / __2__
dispatcher-return-bar-tooltip=Sloty zwrotne: __1__ / __2__
priority-slider-tooltip=Priorytet (0-100). Wyższe wartości są preferowane przy wyborze zaopatrzenia.\nMoże być nadpisany sygnałem obwodowym [virtual-signal=signal-P].
priority-override-tooltip=Nadpisany przez sygnał obwodowy [virtual-signal=signal-P]
channel-override-tooltip=Nadpisany przez sygnał obwodowy [virtual-signal=signal-C]
threshold-override-tooltip=Nadpisany przez sygnał obwodowy [virtual-signal=signal-T]
storage-limit-override-tooltip=Nadpisane przez circuit writer lub ręczne ustawienie limitu magazynowania
filter-label-tooltip=Filtruj wszystkie zakładki według określonego sygnału przedmiotu lub płynu
network-dropdown-tooltip=Wybierz sieć drogową do wyświetlenia
surface-dropdown-tooltip=Wybierz planetę lub powierzchnię do wyświetlenia
drone-open-inventory-tooltip=Otwórz magazyn dronów, aby zarządzać dronami transportowymi
drone-back-to-depot-tooltip=Wróć do zajezdni nadrzędnej
priority-signal-chooser-tooltip=Sygnał wirtualny do odczytu z przewodów obwodowych w celu nadpisania priorytetu
supply-threshold-signal-tooltip=Sygnał [virtual-signal=signal-T] na przewodach obwodowych nadpisuje próg zaopatrzenia
channel-signal-tooltip=Sygnał [virtual-signal=signal-C] na przewodach obwodu nadpisuje kanał

writer-gui-title=Nadawca zajezdni transportowej
writer-not-attached=Niepołączony z żadną zajezdnią.\nUmieść ze strzałką skierowaną w stronę zajezdni.
writer-attached-to=Podłączony do:
writer-use-as-limit=Użyj wartości sygnału jako maks. przedmiotów
writer-use-as-limit-tooltip=Używa najwyższej wartości sygnału przedmiotu/płynu z przewodu jako limitu magazynowania dla tej zajezdni. Ograniczone do maks. slotów dronów × pojemność.
writer-set-recipe=Wymuś recepturę z sygnału
writer-set-recipe-tooltip=Wymusza recepturę zajezdni na pierwszy sygnał przedmiotu/płynu z przewodu.
writer-no-signal=Brak sygnału na przewodzie
writer-condition-label=Warunek włączenia/wyłączenia:
writer-condition-tooltip=Zajezdnia jest włączona, gdy ten warunek jest spełniony. Wyczyść sygnał, aby wyłączyć sterowanie obwodowe.
writer-status-enabled=Włączona - warunek spełniony
writer-status-disabled=Wyłączona - warunek niespełniony
writer-status-no-condition=Włączona - brak warunku
writer-depot-disabled=Wyłączone przez sieć obwodów
writer-rhs-switch-signal=Porównaj z sygnałem
writer-rhs-switch-constant=Porównaj ze stałą
writer-condition-value=Bieżąca wartość
writer-signals-label=Sygnały wejściowe:
reader-gui-title=Czytnik zajezdni transportowych
reader-not-attached=Nie podlaczony do zadnej zajezdni.\nUmiesc strzalka w kierunku zajezdni.
reader-attached-to=Podlaczony do:
reader-status-enabled=Włączone - warunek writera spełniony
reader-status-disabled=Wyłączone - warunek writera niespełniony
reader-status-no-condition=Włączone - brak warunku w writerze
reader-status-no-writer=Włączone - brak writera
depot-status-enabled=Wlaczony - warunek nadawcy spelniony
depot-status-disabled=Wylaczony - warunek nadawcy niespelniony
reader-mode-label=Tryb wyjscia:
reader-mode-depot=Zawartosc zajezdni
reader-mode-network=Zaopatrzenie sieci
reader-mode-network-excl=Zaopatrzenie sieci (bez zajezdni)
reader-mode-tooltip=Wybierz wyjscie czytnika:\n- Zawartosc zajezdni: przedmioty w tej zajezdni\n- Zaopatrzenie sieci: laczna ilosc ze wszystkich zajezdni\n- Zaopatrzenie sieci (bez): to samo, ale bez tej zajezdni
reader-extra-signals=Dodatkowe sygnaly
reader-show-drones=Liczba dronow
reader-show-active=Aktywne drony
reader-show-fuel=Dostepne paliwo
reader-show-capacity=Maksymalna pojemnosc
reader-show-stack-size=Rozmiar stosu
reader-show-max-stacks=Maksymalne stosy
reader-show-used-stacks=Uzyte stosy
reader-show-returning=Powracajace stosy

[item-description]
transport-drone=Transportuje przedmioty między zajezdniami w sieci drogowej.\n[font=default-bold]Bonusy jakości:[/font]\n  Prędkość: +15% niezwykła, +30% rzadka, +50% epicka, +80% legendarna.\n  Oszczędność paliwa: 10% niezwykła, 20% rzadka, 30% epicka, 45% legendarna.

[entity-description]
request-depot=Wysyła drony do zbierania przedmiotów z zajezdni zaopatrzenia w sieci drogowej.\n[font=default-bold]Jakość:[/font] Sloty dronów: 5/6/7/8/10.
supply-depot=Udostępnia swój inwentarz sieci drogowej.\n[font=default-bold]Jakość:[/font] Inwentarz: 80/100/125/175/250 slotów.
supply-depot-chest=Udostępnia swój inwentarz sieci drogowej. Opcjonalnie pozwala robotom logistycznym pobierać przedmioty (pasywny dostawca).\n[font=default-bold]Jakość:[/font] Inwentarz: 80/100/125/175/250 slotów.
buffer-depot=Działa jednocześnie jako zajezdnia zamówieniowa i zaopatrzeniowa.\n[font=default-bold]Jakość:[/font] Sloty dronów: 5/6/7/8/10.
fuel-depot=Dostarcza paliwo do innych zajezdni w sieci drogowej.\n[font=default-bold]Jakość:[/font] Sloty dronów: 5/6/7/8/10.
active-depot=Aktywnie wysyła przedmioty ze swojego inwentarza do zajezdni zamówieniowych w sieci drogowej. Bez recepty - wkładaj przedmioty taśmami lub ramionami.\n[font=default-bold]Jakość:[/font] Inwentarz: 80/100/125/175/250 slotów. Sloty dronów: 5/6/7/8/10.
active-depot-chest=Wewnętrzny magazyn zajezdni aktywnej. Przedmioty włożone tutaj są automatycznie wysyłane do zajezdni zamówieniowych.
storage-depot=Pasywny magazyn dla sieci drogowej. Zajezdnie zamowien pobieraja przedmioty jak z zajezdni zaopatrzenia. Zajezdnie aktywne przesylaja nadmiarowe przedmioty.\n[font=default-bold]Jakosc:[/font] Inwentarz: 80/100/125/175/250 miejsc.
storage-depot-chest=Pasywny magazyn dla sieci drogowej. Zajezdnie zamowien pobieraja przedmioty jak z zajezdni zaopatrzenia. Zajezdnie aktywne przesylaja nadmiarowe przedmioty.\n[font=default-bold]Jakosc:[/font] Inwentarz: 80/100/125/175/250 miejsc.
fluid-depot=Udostępnia swoje płyny sieci drogowej.
transport-depot-reader=Przekazuje zawartosc zajezdni lub zaopatrzenie sieci jako sygnaly obwodu. Uzyj interfejsu aby przelaczac miedzy zawartoscia zajezdni, pelnym zaopatrzeniem sieci lub zaopatrzeniem sieci bez tej zajezdni.
transport-depot-writer=Kontroluje podłączoną zajezdnię za pomocą warunków obwodowych lub logistycznych. Może również nadpisać liczbę zamówień dla zajezdni zamówieniowych/buforowych. Odczytuje [virtual-signal=signal-P] z przewodów, aby nadpisać priorytet zajezdni. Odczytuje [virtual-signal=signal-T], aby nadpisać próg zaopatrzenia.
road-network-reader=Odczytuje łączną ilość wybranych przedmiotów we wszystkich zajezdniach zaopatrzenia w sieci drogowej. Obsługuje wiele sygnałów jednocześnie.
road-network-reader-filtered=Odczytuje całkowitą podaż w sieci drogowej, z wyłączeniem inwentarza podłączonego magazynu. Umieść obok magazynu zaopatrzenia lub buforowego. Zapobiega pętlom sprzężenia zwrotnego w obwodach.
depot-drone-chest=Przechowuje drony transportowe dla tej zajezdni. Liczba slotów rośnie z jakością zajezdni. Obsługuje dostawy robotami logistycznymi.
drone-dispatcher=Przyjmuje drony transportowe przez podajniki lub roboty. Laczy sie z siecia drogowa w celu dystrybucji dronow.\n[font=default-bold]Jakosc:[/font] Inwentarz: 10/12/14/16/20 miejsc.
drone-dispatcher-chest=Przyjmuje drony transportowe przez podajniki lub roboty. Laczy sie z siecia drogowa w celu dystrybucji dronow.\n[font=default-bold]Jakosc:[/font] Inwentarz: 10/12/14/16/20 miejsc.

