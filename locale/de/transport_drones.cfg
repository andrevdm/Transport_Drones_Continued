dispatcher-desc=Drohnen in die blauen Felder legen. Der Verteiler sendet sie an Depots mit Bedarf und sammelt ueberschuessige ein. Rote Felder sind fuer zurueckkehrende Drohnen reserviert und werden zuerst versendet.
central-dispatch-label=Zentraler Versand
central-dispatch-tooltip=Wenn aktiviert, sendet der Verteiler eigene Drohnen, um Gegenstände von Versorgungs-/Aktiv-Depots abzuholen und an Anforderungs-/Puffer-/Lager-Depots mit Bedarf zu liefern.
central-dispatch-slider-label=Drohnenzuteilung:
central-dispatch-slider-tooltip=Maximaler Prozentsatz der Drohnen im Verteiler-Inventar, die gleichzeitig fuer zentrale Lieferungen eingesetzt werden koennen.

storage-limit-label=Max. Lagerung:
storage-limit-tooltip=Begrenzt die Gesamtmenge an Gegenständen, die dieses Depot anfordert, unabhängig von der Drohnenanzahl. Leer lassen für Standardverhalten (Drohnenanzahl × Kapazität). Kann auch über einen Schaltkreisschreiber gesetzt werden.
ignore-capacity-label=Kapazitätsforschung ignorieren
ignore-capacity-tooltip=Wenn aktiviert, transportieren Drohnen nur ihre Grundkapazität (1 Stapel), Forschungsboni werden ignoriert.
full-stack-only-label=Nur volle Stapel
full-stack-only-tooltip=Wenn aktiviert, holen Drohnen nur volle Stapel von Versorgungsdepots ab. Verhindert kleine Teillieferungen.
quality-label=Qualitat:
quality-tooltip=Qualitat der angeforderten Gegenstande auswahlen.
transfer-to-depot-label=Gegenstände übertragen:
transfer-to-depot-tooltip=Passende Gegenstände aus deinem Inventar in das Depot übertragen.
transfer-all-to-depot=Alle
transfer-all-to-depot-tooltip=Alle passenden Gegenstände aus deinem Inventar in das Depot übertragen.
transfer-stack-to-depot=x1
transfer-stack-to-depot-tooltip=Einen Stapel passender Gegenstände aus deinem Inventar in das Depot übertragen.

channel-label=Kanal:
channel-tooltip=Bitmasken-Kanal zur Netzwerktrennung. Depots interagieren nur, wenn ihre Kanäle mindestens ein gemeinsames Bit haben (bitweises UND ≠ 0).\n\n-1 = alle Kanäle (Standard)\n1, 2, 4, 8... = separate Kanäle\n3 = Kanäle 1 + 2\n\nÄhnlich wie LTN-Netzwerk-IDs.

allow-central-dispatch-label=Zentralversand erlauben
allow-central-dispatch-tooltip=Wenn aktiviert, kann der Drohnen-Dispatcher mit diesem Depot interagieren - Gegenstände von Versorgungs-/Aktiv-Depots abholen oder an Anforderungs-/Puffer-/Lager-Depots liefern. Deaktivieren, um dieses Depot von der Zentralverteilung auszuschliessen und nur eigene Drohnenoperationen beizubehalten.

supply-threshold-label=Angebotsschwelle:
supply-threshold-tooltip=Reserviert diese Anzahl an Gegenständen im Depot. Nur der Überschuss über der Schwelle wird dem Straßennetz angeboten. Leer lassen für keine Reserve. Kann auch über einen Schaltkreisschreiber mit dem Signal [virtual-signal=signal-T] gesetzt werden.

allow-bots-label=Logistikroboter erlauben
allow-bots-tooltip=Wenn aktiviert, fungiert das Depot als passiver Anbieter – Logistikroboter können Gegenstände entnehmen.
allow-bots-tooltip-locked=Erfordert Transportlogistik-Forschung.

fluid-mode-label=Flüssigkeitsmodus
fluid-mode-tooltip=Wenn aktiviert, schiebt das Depot Flüssigkeiten aus seiner Südleitung statt Gegenstände aus seiner Kiste. Verbinde eine Rohrleitung, um die zu schiebende Flüssigkeit bereitzustellen.
fluid-mode-confirm-title=Moduswechsel bestaetigen
fluid-mode-confirm-message=Das Depot enthaelt noch Gegenstaende oder Fluessigkeiten des aktuellen Modus. Ein Wechsel zerstoert diese. Fortfahren?
fluid-mode-confirm-yes=Bestaetigen
fluid-mode-confirm-no=Abbrechen

storage-filter-label=Speicherfilter:
storage-filter-tooltip=Waehlen Sie einen Gegenstand oder eine Fluessigkeit als Filter. Nur der gewaehlte Typ kann gelagert werden. Aktive Depots schieben passende Gegenstaende in dieses Depot.

multi-pipe-label=Zusaetzliche Rohranschluesse
multi-pipe-tooltip=Wenn aktiviert, fuegt dem Fluessigkeitsspeicher des Depots Ost- und West-Rohranschluesse hinzu. Ermoeglicht den Anschluss weiterer Rohre fuer parallelen Fluessigkeitsdurchsatz.
multi-pipe-tooltip-fluid=Zuerst den Fluessigkeitsmodus aktivieren, um zusaetzliche Rohranschluesse zu nutzen.
multi-pipe-tooltip-locked=Erfordert die Forschung Mehrfach-Rohranschluesse.

map-button-tooltip=Klicken, um zu diesem Depot zu zoomen
drones-active-available-tooltip=Aktive Drohnen liefern Gegenstände. Verfügbare Drohnen sind im Leerlauf und bereit zur Entsendung.
drone-bar-tooltip=__1__% verfügbar
dispatcher-user-bar-tooltip=Eingabe-Slots: __1__ / __2__
dispatcher-return-bar-tooltip=Rückgabe-Slots: __1__ / __2__
priority-slider-tooltip=Priorität (0-100). Höhere Werte werden bei der Versorgungsauswahl bevorzugt.\nKann durch Schaltungssignal [virtual-signal=signal-P] überschrieben werden.
priority-override-tooltip=Überschrieben durch Schaltungssignal [virtual-signal=signal-P]
channel-override-tooltip=Überschrieben durch Schaltungssignal [virtual-signal=signal-C]
threshold-override-tooltip=Überschrieben durch Schaltungssignal [virtual-signal=signal-T]
