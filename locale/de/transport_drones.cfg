reader-mode-tooltip=Waehle die Ausgabe des Lesers:\n- Depotinhalt: Gegenstaende in diesem Depot\n- Netzwerkangebot: Gesamtmenge aller Versorgungsdepots\n- Netzwerkangebot (ohne): dasselbe, aber ohne dieses Depot
