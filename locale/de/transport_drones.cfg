[transport_drones_pages]
welcome-1=Willkommen bei Transport Drones!\nTransport Drones ist eine Mod, welche eine neue Methode einführt, Materialien in Deiner Fabrik umherzutransportieren.
fuel-depot-1=Jeder Transport innnerhalb des Straßennetzes benötigt Brennstoff, welcher von [font=default-bold]Brennstoffdepots[/font] geliefert wird.\n\nDer Vorgang ist simpel:\n – Platziere ein Brennstoffdepot an einer Straße.\n – Füge Brennstoff hinzu.\n – Füge Drohnen hinzu.\n\nNun wird das Brennstoffdepot Drohnen in das Straßennetz entsenden, um den Brennstoff anderer Depots aufzufüllen.
drones-1=[font=default-bold]Transportdrohnen[/font] transportieren Material zwischen Depots und sind immer nur einem Depot zugewiesen. Zum Arbeiten benötigen sie Brennstoff und produzieren beim Umherfahren Umweltverschmutzung.
request-depot-1=Um Gegenstände im Straßennetz zu transportieren, verwendest Du [font=default-bold]Anforderungsdepots[/font]. Diese entsenden Drohnen zum nächsten Versorgungsdepot mit dem angeforderten Gegenstand.\nDie Menge der gesammelten Gegenstände hängt von der Anzahl der Drohnen im Anforderungsdepot ab. Pro Drohne erhöht das Depot seine Anforderungsmenge um die Kapazität der Drohne.\n\n    Beispiel 1: Wenn die Drohnen 1 Stapel tragen können (ohne Upgrades) und Du 5 Drohnen einsetzt, wird das Depot Drohnen entsenden, bis es 5 Stapel im Inventar hat.\n    Beispiel 2: Wenn die Drohnen 2 Stapel tragen können (1 Kapazitätsupgrade) und Du 10 Drohnen einsetzt, wird das Depot Drohnen entsenden, bis es 20 Stapel hat.\n\nSo kannst Du die Anforderungsmenge anpassen und Faktoren wie Durchsatz und Entfernung berücksichtigen. Die Anforderungsmenge kann mit Transportdepotschreibern überschrieben werden.\n\nZusätzliche Steuerungsmöglichkeiten im Prioritäts-Panel:\n - [font=default-bold]Max. Lagerung[/font]: Begrenzt die Gesamtmenge, die das Depot anfordert, unabhängig von der Drohnenanzahl.\n - [font=default-bold]Kapazitätsforschung ignorieren[/font]: Drohnen transportieren nur ihre Grundkapazität (1 Stapel), Forschungsboni werden ignoriert.\n - [font=default-bold]Nur volle Stapel[/font]: Drohnen holen nur volle Stapel ab, keine kleinen Teillieferungen.\n\nDie Einrichtung eines Anforderungsdepots ist einfach:\n – Platziere das Anforderungsdepot am Straßennetz.\n – Wähle den anzufordernden Gegenstand.\n – Füge Transportdrohnen ein.\nDas Anforderungsdepot fordert zuerst Brennstoff aus dem Netz an. Sobald Brennstoff vorhanden ist, beginnt es, Drohnen zur Abholung des angeforderten Gegenstands zu entsenden.
supply-depot=[font=default-bold]Versorgungsdepots[/font] (und Flüssigkeitsdepots) sind passive Teilnehmer im Straßennetz. Sie stellen ihren Inhalt den Anforderungsdepots im Netz zur Verfügung.
road-network=Das [font=default-bold]Straßennetz[/font] ist das System, durch das die Depots mithilfe von Straßen, auf denen die Drohnen operieren, miteinander verbunden sind. Der Bau eines Straßennetzes erfolgt durch das Bauen von Straßenkacheln, die miteinander verbunden sind. Voneinander getrennte Straßen bilden unterschiedliche Straßennetze, derren Depots sich nicht gegenseitig versorgen.
buffer-depot=Das [font=default-bold]Pufferdepot[/font] fungiert gleichzeitig als Anforderungs- und Versorgungsdepot.\n\nEin gutes Beispiel ist das Sammeln von Erzen aus weit entfernten Außenposten zur Verteilung an nahe gelegene Anforderungsdepots. Das Pufferdepot kann viele Drohnen haben, während die nahen Anforderungsdepots nur 1 oder 2 Drohnen für die kurze Strecke benötigen.
circuit-connectors=Die Schaltungsverbinder ermöglichen das Lesen und Schreiben von Signalen an Depots und das Straßennetz. Sie erlauben die Verwendung von Logistikbedingungen und Schaltungsnetzlogik zur Steuerung des Depotverhaltens.
depot-reader=Der [font=default-bold]Transportdepotleser[/font] ermoeglicht das Auslesen von Daten eines angeschlossenen Depots.\n\nAusgabemodi:\n- [font=default-bold]Depotinhalt[/font]: die im Depot gelagerten Gegenstaende oder Fluessigkeiten.\n- [font=default-bold]Netzwerkangebot[/font]: Gesamtmenge ueber alle Versorgungsdepots im Netzwerk.\n- [font=default-bold]Netzwerkangebot (ohne Depot)[/font]: dasselbe, aber ohne das angeschlossene Depot.\n\nZusaetzliche Signale koennen aktiviert werden: Drohnenanzahl, aktive Drohnen, Treibstoff, Kapazitaet und Stapelinformationen.
depot-writer=Der [font=default-bold]Transportdepotschreiber[/font] ermöglicht das Aktivieren und Deaktivieren von Depots basierend auf Schaltungs-/Logistikbedingungen.\n    Beispiel 1: Das Deaktivieren eines Anforderungsdepots stoppt das Entsenden von Drohnen.\n    Beispiel 2: Das Deaktivieren eines Versorgungsdepots verhindert, dass es seine Gegenstände dem Netz zur Verfügung stellt.
transport-depots=Transportdepots sind die Entitäten im Straßennetz, die den Transport von Gegenständen und Flüssigkeiten koordinieren. Sie verwalten Inhalt und Anforderungen des Netzes. Sie verbinden sich über die 'Vorsicht'-Platte am Boden mit dem Straßennetz, wo die Drohnen ein- und aussteigen.
network-reader=Der [font=default-bold]Straßennetzleser[/font] kann den Inhalt des verbundenen Straßennetzes lesen. Öffne den Leser und setze ein oder mehrere Gegenstands-/Flüssigkeitssignale in seine Slots. Der Leser aktualisiert jedes Signal kontinuierlich mit der Gesamtmenge dieses Gegenstands über alle Versorgungsdepots im Netz.\n\nMehrere Signale können gleichzeitig überwacht werden - jeder Slot verfolgt einen anderen Gegenstand unabhängig.\n\nSo kannst Du z.B. Produktionslinien aktivieren oder deaktivieren, wenn die Erzmenge im Netz unter einen bestimmten Wert fällt, oder einen Reservespeicher aktivieren.
filtered-reader=Der [font=default-bold]Straßennetzleser (ohne Depot)[/font] funktioniert wie der Standard-Straßennetzleser, schließt aber den Bestand des angeschlossenen Depots aus den Gesamtwerten aus.\n\nDies verhindert Rückkopplungsschleifen, wenn der Netzbestand zur Steuerung eines Versorgungsdepots verwendet wird. Wenn Du z.B. ein Versorgungsdepot deaktivieren möchtest, wenn das Netz genug Gegenstände hat, verwende diesen Leser, um die eigenen Gegenstände des Depots nicht mitzuzählen.\n\nPlatziere ihn neben einem Depot (wie den Depotleser/-schreiber) mit der Richtung zum Depot zeigend.

