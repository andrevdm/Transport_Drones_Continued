network-dropdown-tooltip=Wähle das anzuzeigende Straßennetz
surface-dropdown-tooltip=Wähle den Planeten oder die Oberfläche zur Anzeige
drone-open-inventory-tooltip=Drohneninventar öffnen, um Transportdrohnen zu verwalten
drone-back-to-depot-tooltip=Zurück zum übergeordneten Depot
priority-signal-chooser-tooltip=Virtuelles Signal zum Lesen von Schaltungsdrähten für Prioritätsüberschreibung
supply-threshold-signal-tooltip=Signal [virtual-signal=signal-T] auf Schaltungsdrähten überschreibt die Angebotsschwelle
channel-signal-tooltip=Signal [virtual-signal=signal-C] auf Schaltkreisleitungen überschreibt den Kanal

writer-gui-title=Transportdepotschreiber
writer-not-attached=Nicht mit einem Depot verbunden.\nMit Pfeil zum Depot zeigend platzieren.
writer-attached-to=Verbunden mit:
writer-use-as-limit=Signalwert als max. Gegenstände verwenden
writer-use-as-limit-tooltip=Verwendet den höchsten Gegenstands-/Flüssigkeitssignalwert vom Kabel als Speicherlimit für dieses Depot. Begrenzt auf max. Drohnenplätze × Kapazität.
writer-set-recipe=Rezept aus Signal erzwingen
writer-set-recipe-tooltip=Erzwingt das Depotrezept auf das erste Gegenstands-/Flüssigkeitssignal vom Kabel.
writer-no-signal=Kein Signal auf Kabel
writer-condition-label=Aktivierungs-/Deaktivierungsbedingung:
writer-condition-tooltip=Das Depot ist aktiv, wenn diese Bedingung erfüllt ist. Signal löschen, um Schaltungssteuerung zu deaktivieren.
writer-status-enabled=Aktiv - Bedingung erfüllt
