[item-description]
transport-drone=Transportiert Gegenstände zwischen Depots im Straßennetz.\n[font=default-bold]Qualitätsboni:[/font]\n  Geschwindigkeit: +15% ungewöhnlich, +30% selten, +50% episch, +80% legendär.\n  Brennstoffersparnis: 10% ungewöhnlich, 20% selten, 30% episch, 45% legendär.

[entity-description]
request-depot=Entsendet Drohnen, um Gegenstände von Versorgungsdepots im Straßennetz abzuholen.\n[font=default-bold]Qualität:[/font] Drohnenplätze: 5/6/7/8/10.
supply-depot=Stellt sein Inventar dem Straßennetz zur Verfügung.\n[font=default-bold]Qualität:[/font] Inventar: 80/100/125/175/250 Plätze.
supply-depot-chest=Stellt sein Inventar dem Straßennetz zur Verfügung. Kann optional Logistikrobotern erlauben, Gegenstände zu entnehmen (passiver Anbieter).\n[font=default-bold]Qualität:[/font] Inventar: 80/100/125/175/250 Plätze.
buffer-depot=Fungiert gleichzeitig als Anforderungs- und Versorgungsdepot.\n[font=default-bold]Qualität:[/font] Drohnenplätze: 5/6/7/8/10.
fuel-depot=Liefert Brennstoff an andere Depots im Straßennetz.\n[font=default-bold]Qualität:[/font] Drohnenplätze: 5/6/7/8/10.
active-depot=Schiebt aktiv Gegenstände aus seinem Inventar zu Anforderungsdepots im Straßennetz. Kein Rezept erforderlich - Gegenstände per Fließband oder Greifarm einfügen.\n[font=default-bold]Qualität:[/font] Inventar: 80/100/125/175/250 Plätze. Drohnenplätze: 5/6/7/8/10.
active-depot-chest=Interner Speicher des aktiven Depots. Hier eingefügte Gegenstände werden automatisch an Anforderungsdepots geliefert.
storage-depot=Passives Lager fuer das Strassennetz. Anforderungsdepots entnehmen Gegenstaende wie aus einem Versorgungsdepot. Aktive Depots schieben ueberschuessige Gegenstaende hinein.\n[font=default-bold]Qualitaet:[/font] Inventar: 80/100/125/175/250 Plaetze.
storage-depot-chest=Passives Lager fuer das Strassennetz. Anforderungsdepots entnehmen Gegenstaende wie aus einem Versorgungsdepot. Aktive Depots schieben ueberschuessige Gegenstaende hinein.\n[font=default-bold]Qualitaet:[/font] Inventar: 80/100/125/175/250 Plaetze.
fluid-depot=Stellt sein Flüssigkeitsinventar dem Straßennetz zur Verfügung.
transport-depot-reader=Gibt Depotinhalt oder Netzwerkangebot als Schaltungssignale aus. Verwende die Oberflaeche zum Umschalten zwischen Depotinhalt, vollem Netzwerkangebot oder Netzwerkangebot ohne dieses Depot.
transport-depot-writer=Steuert das angeschlossene Depot über Schaltungs- oder Logistikbedingungen. Kann auch die Anforderungsmenge für Anforderungs-/Pufferdepots überschreiben. Liest [virtual-signal=signal-P] von Kabeln, um die Depotpriorität zu überschreiben. Liest [virtual-signal=signal-T], um die Angebotsschwelle zu überschreiben.
road-network-reader=Liest die Gesamtmenge ausgewählter Gegenstände über alle Versorgungsdepots im Straßennetz. Unterstützt mehrere Signale gleichzeitig.
road-network-reader-filtered=Liest den Gesamtbestand im Straßennetzwerk, ohne den Bestand des angeschlossenen Depots. Neben einem Versorgungs- oder Pufferdepot platzieren. Verhindert Rückkopplungsschleifen im Schaltkreis.
depot-drone-chest=Lagert Transportdrohnen für dieses Depot. Platzanzahl skaliert mit der Depotqualität. Unterstützt Lieferung durch Logistikroboter.
drone-dispatcher=Nimmt Transportdrohnen ueber Greifer oder Roboter entgegen. Verbindet sich mit dem Strassennetz zur Drohnenverteilung.\n[font=default-bold]Qualitaet:[/font] Inventar: 10/12/14/16/20 Plaetze.
drone-dispatcher-chest=Nimmt Transportdrohnen ueber Greifer oder Roboter entgegen. Verbindet sich mit dem Strassennetz zur Drohnenverteilung.\n[font=default-bold]Qualitaet:[/font] Inventar: 10/12/14/16/20 Plaetze.

