[mod-setting-description]
transport-depot-update-interval=Wie oft (in Ticks) jedes Depot seine Update-Logik ausführt. Niedrigere Werte = reaktionsschneller, aber höherer UPS-Verbrauch. Standard: 60 Ticks (1 Sekunde).
fuel-fluid=Die Flüssigkeit, die als Brennstoff für Transportdrohnen verwendet wird. Alle Brennstoffdepots müssen diese Flüssigkeit liefern.
fuel-amount-per-drone=Brennstoffmenge, die pro Drohnenentsendung verbraucht wird. Höhere Werte erhöhen den Verbrauch pro Fahrt.
drone-fluid-capacity=Maximale Brennstoffmenge, die eine Brennstoffdrohne pro Lieferung transportieren kann.
fluid-depot-capacity=Maximale Flüssigkeitsspeicherkapazität für Flüssigkeitsdepots. Höhere Kapazität ermöglicht mehr Drohnenentsendungen bevor das Depot voll ist. Ein Standard-Lagertank fasst 25.000 als Referenz. Erfordert Neustart.
request-depot-fluid-capacity=Ausgabepufferkapazität für Anforderungsdepots. Größere Werte erhöhen den Durchsatz in verbundene Rohre. Ein Standard-Lagertank fasst 25.000 als Referenz. Erfordert Neustart.
fuel-consumption-per-meter=Brennstoff, der pro Meter von Transportdrohnen verbraucht wird. Auf 0 setzen, um den Verbrauch zu deaktivieren.
drone-pollution-per-second=Verschmutzung pro Sekunde durch jede aktive Transportdrohne. Auf 0 setzen, um die Verschmutzung zu deaktivieren.
transport-drone-pathfinder-max-steps=Maximale Pfadfinder-Schritte pro Tick. Höhere Werte verbessern die Drohnennavigation, kosten aber UPS. Factorio-Standard: 1000.
transport-drone-pathfinder-max-work=Maximale Pfadfinder-Arbeit pro Tick. Höhere Werte verbessern die Drohnennavigation, kosten aber UPS. Factorio-Standard: 8000.
transport-drone-pathfinder-use-cache=Pfad-Cache für den globalen Pfadfinder aktivieren. Deaktivieren für genauere, aber aufwendigere Pfadberechnung. Factorio-Standard: aktiviert.
transport-drone-sound-volume=Lautstärke des Transportdrohnen-Motorsounds (0 = stumm, 100 = Standard).
transport-drones-road-tile-whitelist=Kommagetrennte Muster für Drittanbieter-Fliesen, die als Drohnenstraßen behandelt werden. Einfache Einträge prüfen Objektnamen (Lua-Muster), @-Einträge prüfen Untergruppen. Standard: ^Arci%-,^dect%-concrete%-grid$,@py-tiles. Erfordert Neustart.
transport-drones-diagonal-check=Wenn aktiviert, können Drohnen nicht diagonal durch Ecken zwischen Nicht-Straßen-Kacheln schneiden. Verhindert Abkürzungen durch Lücken. Erfordert Neustart.
transport-drone-load-balance-threshold=Versorgungsdepots mit Bewertungen innerhalb dieser Schwelle zum Besten werden als gleichwertig behandelt und eines wird zufällig ausgewählt. Verteilt die Last auf nahegelegene Depots. Auf 0 setzen, um immer das beste Depot zu wählen.
transport-drone-priority-weight=Wenn größer als 0 wird das absolute Prioritätssystem durch eine gewichtete Bevorzugung ersetzt: Priorität × Gewicht. Priorität wird zu einer weichen Präferenz, die durch Entfernung überstimmt werden kann. 0 = absolute Priorität (Standardverhalten).
transport-drone-max-dispatches-per-tick=Maximale Anzahl von Drohnen, die ein einzelnes Depot pro Aktualisierungszyklus entsenden kann. Dient als Sicherheitslimit gegen unkontrolliertes Entsenden. Im normalen Spiel stoppen natürliche Grenzen (Drohnenbestand, Brennstoff) die Entsendung weit vor diesem Limit. Für sehr große Megabasen erhöhen.
transport-drone-redispatch-interval=Wie oft (in Ticks) Depots mit ausstehender Nachfrage zwischen regulären Zyklen erneut entsenden. Niedrigere Werte = flüssigeres Drohnen-Spawning, etwas mehr UPS. Standard 5 Ticks = 12 Versuche pro Sekunde. Auf 1 setzen für maximale Reaktionsfähigkeit.
transport-drones-space-platform-roads=Ermöglicht das Platzieren von Straßenfliesen auf Weltraumplattform-Fundamenten. Deaktivieren, wenn ein anderer Mod das Platzieren von Fliesen auf Plattform-Fundamenten verhindern muss. Erfordert Neustart.
active-depot-overfill-percent=Prozentsatz, um den aktive Depots Anforderungsdepots über deren normales Lagerlimit hinaus befüllen können. Bei 25 % kann ein Anforderungsdepot mit einem 200-Gegenstandslimit bis zu 250 von aktiven Depots erhalten. Auf 0 setzen für strikte Grenzen. Die eigenen Drohnen des Anforderungsdepots respektieren weiterhin das normale Limit.
enable-drone-dispatcher=Wenn aktiviert, ist das Drohnen-Verteiler-Gebaeude verfuegbar (freigeschaltet durch Transportsystem-Forschung). Deaktivieren, um Verteiler aus dem Spiel zu entfernen. Erfordert Neustart.
enable-active-depot=Wenn aktiviert, ist das aktive Depot verfuegbar (freigeschaltet durch Forschung Aktiver Transport). Deaktivieren, um aktive Depots aus dem Spiel zu entfernen. Erfordert Neustart.
enable-storage-depot=Wenn aktiviert, ist das Lagerdepot verfuegbar (freigeschaltet durch Forschung Aktiver Transport). Deaktivieren, um Lagerdepots aus dem Spiel zu entfernen. Erfordert Neustart.
enable-multi-pipe=Wenn aktiviert, ist die Technologie Mehrfach-Rohranschluesse verfuegbar, die zusaetzliche Ost/West-Rohranschluesse an Fluessigkeitsdepots freischaltet. Erfordert Neustart.
transport-drone-stack-size=Anzahl der Transportdrohnen pro Inventarstapel. Beeinflusst, wie viele Drohnen in das Drohneninventar der Depots passen. Neustart erforderlich.
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

