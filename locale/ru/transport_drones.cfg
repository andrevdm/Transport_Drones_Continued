[transport_drones_pages]
welcome-1=Добро пожаловать в Transport Drones!\nTransport Drones - мод, который добавляет новый способ перемещения материалов по вашей фабрике.
fuel-depot-1=Весь транспорт в дорожной сети требует топлива. Топливо доставляется [font=default-bold]Топливными складами[/font].\n\nВсё просто:\n - Поставьте топливный склад на дорожной сети.\n - Подключите топливо.\n - Добавьте транспортных дронов.\n\nТеперь топливный склад будет отправлять дронов для заправки других складов в сети.
drones-1=[font=default-bold]Транспортные дроны[/font] - агенты, перевозящие материалы между складами. Каждый дрон привязан к одному складу. Для работы им нужно топливо, а при движении они создают загрязнение.
request-depot-1=Для перемещения предметов в дорожной сети используются [font=default-bold]Склады запросов[/font]. Они отправляют дронов к ближайшему складу снабжения с нужным предметом.\nКоличество собираемых предметов зависит от числа дронов на складе запросов. Каждый дрон увеличивает запрашиваемое количество на свою грузоподъёмность.\n\n    Пример 1: Если дроны вмещают 1 стак (без улучшений) и вы поставите 5 дронов, склад будет отправлять дронов, пока не наберёт 5 стаков.\n    Пример 2: Если дроны вмещают 2 стака (1 улучшение) и вы поставите 10 дронов, склад будет набирать до 20 стаков.\n\nТак вы можете настраивать объём запроса с учётом пропускной способности, расстояния и т.д. Количество можно переопределить передатчиком сигналов.\n\nДополнительные элементы управления в панели Приоритет:\n - [font=default-bold]Макс. хранение[/font]: Ограничивает общее количество предметов, которые склад будет запрашивать, независимо от числа дронов.\n - [font=default-bold]Игнорировать исследование вместимости[/font]: Дроны перевозят только базовую вместимость (1 стопка), игнорируя бонусы от исследований.\n - [font=default-bold]Только полные стопки[/font]: Дроны забирают только полные стопки, предотвращая мелкие частичные доставки.\n\nНастройка склада запросов проста:\n - Поставьте склад на дорожной сети.\n - Выберите запрашиваемый предмет.\n - Вставьте транспортных дронов.\nСклад сначала запросит топливо из сети. Получив его, начнёт отправлять дронов за нужным предметом.
supply-depot=[font=default-bold]Склады снабжения[/font] (и склады жидкостей) - пассивные участники дорожной сети. Они делают своё содержимое доступным для складов запросов.
road-network=[font=default-bold]Дорожная сеть[/font] - система, связывающая склады между собой дорогами, по которым перемещаются дроны. Строится просто из дорожных плиток. Все соединённые плитки образуют одну сеть. Разъединённые участки - отдельные сети, их склады не взаимодействуют.
buffer-depot=[font=default-bold]Буферный склад[/font] работает одновременно как склад запросов и склад снабжения.\n\nХорошее применение - сбор руды с удалённых аванпостов для распределения ближайшим складам запросов. Буферный склад может иметь много дронов, а ближним складам запросов достаточно 1-2 дронов для короткого рейса.
circuit-connectors=Разъёмы схемной сети позволяют считывать и передавать сигналы складам и дорожной сети. С их помощью можно использовать логистические условия и логику схемной сети для управления поведением складов.
depot-reader=[font=default-bold]Считыватель транспортного склада[/font] позволяет считывать данные подключенного склада.\n\nРежимы вывода:\n- [font=default-bold]Содержимое склада[/font]: предметы или жидкости на складе.\n- [font=default-bold]Снабжение сети[/font]: общее количество по всем складам снабжения в сети.\n- [font=default-bold]Снабжение сети (без склада)[/font]: то же, но без подключенного склада.\n\nМожно включить дополнительные сигналы: количество дронов, активные дроны, топливо, вместимость и информация о стеках.
depot-writer=[font=default-bold]Передатчик транспортного склада[/font] позволяет включать и отключать склады по условиям схемной сети или логистики.\n    Пример 1: Отключение склада запросов прекратит отправку дронов за предметами.\n    Пример 2: Отключение склада снабжения запретит ему предоставлять предметы в сеть.
transport-depots=Транспортные склады - объекты дорожной сети, координирующие перевозку предметов и жидкостей. Они управляют содержимым и запросами сети. Подключаются через предупредительную плитку на земле, откуда отправляются и прибывают дроны.
network-reader=[font=default-bold]Считыватель дорожной сети[/font] может считывать содержимое подключённой дорожной сети. Откройте считыватель и задайте один или несколько сигналов предметов/жидкостей в его слотах. Считыватель будет постоянно обновлять каждый сигнал общим количеством этого предмета на всех складах снабжения в сети.\n\nНесколько сигналов могут отслеживаться одновременно - каждый слот отслеживает отдельный предмет независимо.\n\nЭто позволяет, например, включать или отключать производственные линии, если количество руды в сети падает ниже заданного значения, или активировать резервное хранилище.
filtered-reader=[font=default-bold]Считыватель дорожной сети (исключая депо)[/font] работает как стандартный считыватель дорожной сети, но исключает инвентарь подключённого депо из итогов.\n\nЭто предотвращает петли обратной связи при использовании снабжения сети для управления складом снабжения. Например, если вы хотите отключить склад снабжения, когда в сети достаточно предметов, используйте этот считыватель, чтобы не считать собственные предметы склада в итоге.\n\nРазместите рядом с депо (как считыватель/передатчик депо) направлением в сторону депо.

