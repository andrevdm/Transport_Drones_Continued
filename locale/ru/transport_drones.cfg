reader-not-attached=Не подключен к складу.\nРазместите стрелкой к складу.
reader-attached-to=Подключен к:
reader-status-enabled=Включён - условие райтера выполнено
reader-status-disabled=Отключён - условие райтера не выполнено
reader-status-no-condition=Включён - условие в райтере не задано
reader-status-no-writer=Включён - райтер не подключён
depot-status-enabled=Включен - условие передатчика выполнено
depot-status-disabled=Отключен - условие передатчика не выполнено
reader-mode-label=Режим вывода:
reader-mode-depot=Содержимое склада
reader-mode-network=Снабжение сети
reader-mode-network-excl=Снабжение сети (без склада)
reader-mode-tooltip=Выбор вывода считывателя:\n- Содержимое склада: предметы на этом складе\n- Снабжение сети: общее количество по всем складам\n- Снабжение сети (без): то же, но без этого склада
