writer-gui-title=Передатчик транспортного склада
writer-not-attached=Не подключён ни к одному складу.\nРазместите так, чтобы стрелка указывала на склад.
writer-attached-to=Подключён к:
writer-use-as-limit=Использовать значение сигнала как макс. предметов
writer-use-as-limit-tooltip=Использует наибольшее значение сигнала предмета/жидкости с провода как лимит хранения для этого склада. Ограничено макс. слотами дронов × вместимость.
writer-set-recipe=Принудительно задать рецепт из сигнала
writer-set-recipe-tooltip=Принудительно устанавливает рецепт склада на первый сигнал предмета/жидкости с провода.
writer-no-signal=Нет сигнала на проводе
writer-condition-label=Условие включения/отключения:
writer-condition-tooltip=Склад включается, когда это условие выполнено. Очистите сигнал, чтобы отключить управление схемной сетью.
writer-status-enabled=Включён - условие выполнено
writer-status-disabled=Отключён - условие не выполнено
writer-status-no-condition=Включён - условие не задано
