[item-description]
transport-drone=Перевозит предметы между складами в дорожной сети.\n[font=default-bold]Бонусы качества:[/font]\n  Скорость: +15% необычное, +30% редкое, +50% эпическое, +80% легендарное.\n  Экономия топлива: 10% необычное, 20% редкое, 30% эпическое, 45% легендарное.

[entity-description]
request-depot=Отправляет дронов для сбора предметов со складов снабжения в дорожной сети.\n[font=default-bold]Качество:[/font] Слоты дронов: 5/6/7/8/10.
supply-depot=Делает свой инвентарь доступным для дорожной сети.\n[font=default-bold]Качество:[/font] Инвентарь: 80/100/125/175/250 слотов.
supply-depot-chest=Делает свой инвентарь доступным для дорожной сети. Может опционально позволять логистическим роботам забирать предметы (пассивный поставщик).\n[font=default-bold]Качество:[/font] Инвентарь: 80/100/125/175/250 слотов.
buffer-depot=Работает одновременно как склад запросов и склад снабжения.\n[font=default-bold]Качество:[/font] Слоты дронов: 5/6/7/8/10.
fuel-depot=Доставляет топливо другим складам в дорожной сети.\n[font=default-bold]Качество:[/font] Слоты дронов: 5/6/7/8/10.
active-depot=Активно отправляет предметы из своего инвентаря на склады запросов в дорожной сети. Рецепт не требуется - загружайте предметы через конвейеры или манипуляторы.\n[font=default-bold]Качество:[/font] Инвентарь: 80/100/125/175/250 слотов. Слоты дронов: 5/6/7/8/10.
active-depot-chest=Внутреннее хранилище активного склада. Помещённые сюда предметы автоматически доставляются на склады запросов.
storage-depot=Пассивный склад для дорожной сети. Склады запросов забирают предметы как со склада снабжения. Активные склады отправляют излишки сюда.\n[font=default-bold]Качество:[/font] Инвентарь: 80/100/125/175/250 слотов.
storage-depot-chest=Пассивный склад для дорожной сети. Склады запросов забирают предметы как со склада снабжения. Активные склады отправляют излишки сюда.\n[font=default-bold]Качество:[/font] Инвентарь: 80/100/125/175/250 слотов.
fluid-depot=Делает свои жидкости доступными для дорожной сети.
transport-depot-reader=Выводит содержимое склада или снабжение сети в виде сигналов схемной сети. Используйте интерфейс для переключения между содержимым склада, полным снабжением сети или снабжением сети без этого склада.
transport-depot-writer=Управляет подключённым складом с помощью условий схемной сети или логистики. Может также переопределять количество запроса для складов запросов/буферных. Считывает [virtual-signal=signal-P] с проводов для переопределения приоритета склада. Считывает [virtual-signal=signal-T] для переопределения порога снабжения.
road-network-reader=Считывает общее количество выбранных предметов на всех складах снабжения в дорожной сети. Поддерживает несколько сигналов одновременно.
road-network-reader-filtered=Считывает общее количество предметов в дорожной сети, исключая инвентарь подключённого депо. Разместите рядом с депо снабжения или буферным депо. Предотвращает петли обратной связи в цепях.
depot-drone-chest=Хранит транспортных дронов для этого склада. Количество слотов растёт с качеством склада. Поддерживает доставку логистическими роботами.
drone-dispatcher=Принимает транспортных дронов через манипуляторы или роботов. Подключается к дорожной сети для распределения дронов.\n[font=default-bold]Качество:[/font] Инвентарь: 10/12/14/16/20 слотов.
drone-dispatcher-chest=Принимает транспортных дронов через манипуляторы или роботов. Подключается к дорожной сети для распределения дронов.\n[font=default-bold]Качество:[/font] Инвентарь: 10/12/14/16/20 слотов.

