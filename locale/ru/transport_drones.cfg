priority-desc-request=Выше = получает снабжение первым
priority-desc-fuel=Выше = получает топливо первым
priority-desc-dispatcher=Выше = распределяет дронов первым
dispatcher-desc=Поместите дронов в синие ячейки. Диспетчер отправляет их на депо, которым нужно больше, и собирает лишних. Красные ячейки зарезервированы для возвращающихся дронов и отправляются в первую очередь.
central-dispatch-label=Центральная доставка
central-dispatch-tooltip=При включении диспетчер отправляет собственных дронов за предметами на склады снабжения/активные склады и доставляет их на склады запросов/буферные/хранения с имеющимся спросом.
central-dispatch-slider-label=Выделение дронов:
central-dispatch-slider-tooltip=Максимальный процент дронов в инвентаре диспетчера, которые могут использоваться для центральной доставки в любой момент.

storage-limit-label=Макс. хранение:
storage-limit-tooltip=Ограничивает общее количество предметов, которые этот склад будет запрашивать, независимо от числа дронов. Оставьте пустым для поведения по умолчанию (число дронов × вместимость). Можно также задать через схемный писатель.
ignore-capacity-label=Игнорировать исследование вместимости
ignore-capacity-tooltip=При включении дроны перевозят только базовую вместимость (1 стопка), игнорируя бонусы от исследований.
full-stack-only-label=Только полные стопки
full-stack-only-tooltip=При включении дроны забирают только полные стопки со складов снабжения. Предотвращает мелкие частичные доставки.
quality-label=Качество:
quality-tooltip=Выберите качество предметов для запроса из дорожной сети.
transfer-to-depot-label=Передать предметы:
transfer-to-depot-tooltip=Передать подходящие предметы из инвентаря в этот склад.
transfer-all-to-depot=Все
transfer-all-to-depot-tooltip=Передать все подходящие предметы из инвентаря в этот склад.
transfer-stack-to-depot=x1
transfer-stack-to-depot-tooltip=Передать один стак подходящих предметов из инвентаря в этот склад.

channel-label=Канал:
channel-tooltip=Битовый канал для сегрегации сети. Склады взаимодействуют только при наличии общих битов в каналах (побитовое И ≠ 0).\n\n-1 = все каналы (по умолчанию)\n1, 2, 4, 8... = отдельные каналы\n3 = каналы 1 + 2\n\nАналогично ID сетей LTN.

allow-central-dispatch-label=Разрешить центральную диспетчеризацию
allow-central-dispatch-tooltip=При включении диспетчер дронов может взаимодействовать с этим складом - забирать предметы со складов снабжения/активных складов или доставлять предметы на склады запросов/буферные/хранения. Отключите, чтобы исключить этот склад из центральной диспетчеризации, сохранив собственные операции дронов.

supply-threshold-label=Порог снабжения:
supply-threshold-tooltip=Резервирует это количество предметов на складе. Только избыток сверх порога предлагается дорожной сети. Оставьте пустым для отсутствия резерва. Можно также задать через передатчик сигналов с помощью сигнала [virtual-signal=signal-T].

allow-bots-label=Разрешить логистических роботов
allow-bots-tooltip=При включении склад работает как пассивный поставщик - логистические роботы могут забирать предметы.
allow-bots-tooltip-locked=Требуется исследование «Транспортная логистика».

fluid-mode-label=Режим жидкости
fluid-mode-tooltip=При включении склад отправляет жидкости из южной трубы вместо предметов из сундука. Подключите трубу, чтобы подать жидкость для отправки.
fluid-mode-confirm-title=Подтверждение смены режима
fluid-mode-confirm-message=Депо все ещё содержит предметы или жидкости текущего режима. Переключение уничтожит их. Продолжить?
fluid-mode-confirm-yes=Подтвердить
fluid-mode-confirm-no=Отмена

storage-filter-label=Фильтр хранения:
storage-filter-tooltip=Выберите предмет или жидкость для фильтрации этого склада. Только выбранный тип может храниться. Активные склады будут отправлять подходящие предметы на этот склад.

multi-pipe-label=Дополнительные трубные подключения
multi-pipe-tooltip=При включении добавляет восточные и западные трубные подключения к хранилищу жидкости склада. Позволяет подключать больше труб для параллельного ввода/вывода жидкости.
multi-pipe-tooltip-fluid=Сначала включите режим жидкости, чтобы использовать дополнительные трубные подключения.
multi-pipe-tooltip-locked=Требуется исследование Многотрубные подключения.

map-button-tooltip=Нажмите, чтобы приблизить камеру к этому складу
drones-active-available-tooltip=Активные дроны доставляют предметы. Доступные дроны простаивают и готовы к отправке.
drone-bar-tooltip=__1__% доступно
dispatcher-user-bar-tooltip=Входные слоты: __1__ / __2__
dispatcher-return-bar-tooltip=Слоты возврата: __1__ / __2__
priority-slider-tooltip=Приоритет (0-100). Более высокие значения предпочтительны при выборе снабжения.\nМожет быть переопределён сигналом схемной сети [virtual-signal=signal-P].
priority-override-tooltip=Переопределён сигналом схемной сети [virtual-signal=signal-P]
channel-override-tooltip=Переопределён сигналом схемной сети [virtual-signal=signal-C]
threshold-override-tooltip=Переопределён сигналом схемной сети [virtual-signal=signal-T]
storage-limit-override-tooltip=Переопределено через circuit writer или ручную настройку лимита хранения
filter-label-tooltip=Фильтровать все вкладки по определённому сигналу предмета или жидкости
network-dropdown-tooltip=Выбрать дорожную сеть для отображения
surface-dropdown-tooltip=Выбрать планету или поверхность для просмотра
drone-open-inventory-tooltip=Открыть хранилище дронов для управления транспортными дронами
drone-back-to-depot-tooltip=Вернуться к родительскому складу
priority-signal-chooser-tooltip=Виртуальный сигнал для чтения с проводов схемной сети для переопределения приоритета
supply-threshold-signal-tooltip=Сигнал [virtual-signal=signal-T] на проводах схемной сети переопределяет порог снабжения
