[mod-setting-description]
transport-depot-update-interval=Как часто (в тиках) каждый склад выполняет свою логику обновления. Меньшие значения = более отзывчиво, но выше нагрузка UPS. По умолчанию: 60 тиков (1 секунда).
fuel-fluid=Жидкость, используемая как топливо для транспортных дронов. Все топливные склады должны поставлять эту жидкость.
fuel-amount-per-drone=Количество топлива, потребляемого при каждой отправке дрона. Большие значения увеличивают расход за поездку.
drone-fluid-capacity=Максимальное количество топлива, которое топливный дрон может перевезти за одну доставку.
fluid-depot-capacity=Максимальная ёмкость хранения жидкости для жидкостных складов. Большая ёмкость позволяет отправлять больше дронов до заполнения склада. Стандартный резервуар вмещает 25 000 для справки. Требуется перезапуск.
request-depot-fluid-capacity=Ёмкость выходного буфера жидкости для складов запросов. Большие значения увеличивают пропускную способность в подключённые трубы. Стандартный резервуар вмещает 25 000 для справки. Требуется перезапуск.
fuel-consumption-per-meter=Топливо, потребляемое на метр пути транспортным дроном. Установите 0, чтобы отключить расход топлива.
drone-pollution-per-second=Загрязнение, выбрасываемое в секунду каждым активным дроном. Установите 0, чтобы отключить загрязнение.
transport-drone-pathfinder-max-steps=Максимальное количество шагов поиска пути за тик. Большие значения улучшают маршрутизацию дронов, но снижают UPS. По умолчанию в Factorio: 1000.
transport-drone-pathfinder-max-work=Максимальный объём работы поиска пути за тик. Большие значения улучшают маршрутизацию дронов, но снижают UPS. По умолчанию в Factorio: 8000.
transport-drone-pathfinder-use-cache=Включить кэширование маршрутов для глобального поиска пути. Отключите для более точного, но затратного поиска. По умолчанию в Factorio: включено.
transport-drone-sound-volume=Громкость звука двигателя транспортных дронов (0 = тишина, 100 = по умолчанию).
transport-drones-road-tile-whitelist=Шаблоны через запятую для сторонних плиток, которые будут считаться дорогами дронов. Обычные записи совпадают с именами предметов (шаблоны Lua), записи с @ совпадают с подгруппами. По умолчанию: ^Arci%-,^dect%-concrete%-grid$,@py-tiles. Требуется перезапуск.
transport-drones-diagonal-check=Когда включено, дроны не могут проходить через диагональные углы между недорожными плитками. Предотвращает срезание пути через пробелы. Требуется перезапуск.
transport-drone-load-balance-threshold=Склады снабжения с оценками в пределах этого порога от лучшего считаются равноценными и один выбирается случайно. Распределяет нагрузку между ближайшими складами. Установите 0, чтобы всегда выбирать лучший склад.
transport-drone-priority-weight=Когда больше 0, заменяет абсолютную систему приоритетов на взвешенное смещение: приоритет × вес. Приоритет становится мягким предпочтением, которое может быть перевешено расстоянием. 0 = абсолютный приоритет (поведение по умолчанию).
transport-drone-max-dispatches-per-tick=Максимальное количество дронов, которое один склад может отправить за один цикл обновления. Предохранитель против неконтролируемой отправки. В обычной игре естественные ограничения (запас дронов, топливо) останавливают отправку задолго до этого лимита. Увеличьте для очень больших мегабаз.
transport-drone-redispatch-interval=Как часто (в тиках) склады с ожидающим спросом повторяют отправку между обычными циклами обновления. Меньшие значения = более плавное появление дронов, чуть больше UPS. По умолчанию 5 тиков = 12 попыток в секунду. Установите 1 для максимальной отзывчивости.
transport-drones-space-platform-roads=Позволяет размещать дорожные плитки на фундаментах космических платформ. Отключите, если другой мод должен предотвращать размещение плиток на фундаментах. Требуется перезапуск.
active-depot-overfill-percent=Процент, на который активные склады могут переполнять склады запросов сверх их обычного лимита хранения. При 25 % склад запросов с лимитом в 200 предметов может получить до 250 от активных складов. Установите 0 для строгих лимитов. Собственные дроны склада запросов по-прежнему соблюдают обычный лимит.
enable-drone-dispatcher=При включении здание распределителя дронов становится доступным (разблокируется исследованием Транспортная система). Отключите, чтобы убрать распределители из игры. Требуется перезапуск.
enable-active-depot=При включении здание активного склада становится доступным (разблокируется исследованием Активная транспортировка). Отключите, чтобы убрать активные склады из игры. Требуется перезапуск.
enable-storage-depot=При включении здание складского депо становится доступным (разблокируется исследованием Активная транспортировка). Отключите, чтобы убрать складские депо из игры. Требуется перезапуск.
enable-multi-pipe=При включении технология Многотрубные подключения становится доступной, открывая дополнительные трубные подключения восток/запад на складах жидкостей. Требуется перезапуск.
transport-drone-stack-size=Количество транспортных дронов в одном стаке инвентаря. Влияет на вместимость инвентаря дронов в складах. Требуется перезапуск.
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

