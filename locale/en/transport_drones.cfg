[item-description]
transport-drone=Transports items between depots on the road network.\n[font=default-bold]Quality bonuses:[/font]\n  Speed: +15% uncommon, +30% rare, +50% epic, +80% legendary.\n  Fuel savings: 10% uncommon, 20% rare, 30% epic, 45% legendary.

[entity-description]
request-depot=Dispatches drones to collect items from supply depots on the road network.\n[font=default-bold]Quality:[/font] Drone slots: 5/6/7/8/10.
supply-depot=Makes its inventory available to the road network.\n[font=default-bold]Quality:[/font] Inventory: 80/100/125/175/250 slots.
supply-depot-chest=Makes its inventory available to the road network. Can optionally allow logistics bots to take items.\n[font=default-bold]Quality:[/font] Inventory: 80/100/125/175/250 slots.
buffer-depot=Acts as both a request and supply depot. Can optionally allow logistics bots to take items (buffer chest).\n[font=default-bold]Quality:[/font] Drone slots: 5/6/7/8/10.
fuel-depot=Delivers fuel to other depots on the road network.\n[font=default-bold]Quality:[/font] Drone slots: 5/6/7/8/10.
active-depot=Actively pushes any items from its inventory to request depots on the road network. No recipe required - insert items via belts or inserters.\n[font=default-bold]Quality:[/font] Inventory: 80/100/125/175/250 slots. Drone slots: 5/6/7/8/10.
active-depot-chest=Internal storage for the active depot. Items inserted here are automatically pushed to request depots.
storage-depot=Passive warehouse for the road network. Request depots pull items from it like a supply depot. Active depots push overflow items into it.\n[font=default-bold]Quality:[/font] Inventory: 80/100/125/175/250 slots.
storage-depot-chest=Passive warehouse for the road network. Request depots pull items from it like a supply depot. Active depots push overflow items into it.\n[font=default-bold]Quality:[/font] Inventory: 80/100/125/175/250 slots.
fluid-depot=Makes its fluid inventory available to the road network.
transport-depot-reader=Outputs depot content or network supply as circuit signals. Use the GUI to switch between depot content, full network supply, or network supply excluding this depot.
transport-depot-writer=Controls the attached depot using circuit or logistic conditions. Can also override the request count for request/buffer depots. Reads [virtual-signal=signal-P] from wires to override the depot's priority. Reads [virtual-signal=signal-T] to override the supply threshold.
road-network-reader=Reads the total amount of selected items across all supply depots in the road network. Supports multiple signals simultaneously.
road-network-reader-filtered=Reads the total supply in the road network, excluding the attached depot's inventory. Place adjacent to a supply or buffer depot. Prevents circuit feedback loops.
depot-drone-chest=Stores transport drones for this depot. Slot count scales with depot quality. Supports logistics robot delivery.
drone-dispatcher=Accepts transport drones via inserters or bots. Connects to the road network for future drone distribution.\n[font=default-bold]Quality:[/font] Inventory: 10/12/14/16/20 slots.
drone-dispatcher-chest=Accepts transport drones via inserters or bots. Connects to the road network for future drone distribution.\n[font=default-bold]Quality:[/font] Inventory: 10/12/14/16/20 slots.

