[transport_drones_pages]
welcome-1=Welcome to Transport Drones!\nTransport drones is a mod which introduces a new method of moving materials around your Factory.
fuel-depot-1=All transportation within the road network requires fuel. Fuel is delivered by [font=default-bold]Fuel Depots[/font].\n\nThe operation is simple:\n - Place a fuel depot on the road network.\n - Plumb in the fuel.\n - Add transport drones.\n\nNow the fuel depot will dispatch transport drones to fuel depots in the road network.
drones-1=The [font=default-bold]Transport drones[/font] are the agents that transport material between depots. They are only ever assigned to a single depot. To work they require fuel, and they produce pollution as they drive around.
request-depot-1=To move items in in the road network, you use [font=default-bold]Request Depots[/font]. These will dispatch drones to the nearest supply depot with the requested item.\nThe number of items the request depot will collect is dependant on the number of drones in the request depot. For each drone, the request depot will increase its requested amount by the capacity of the drone.\n\n    Example 1: If the drones can hold 1 stack (no upgrades), and you put in 5 drones, the request depot will dispatch drones until it has 5 stacks in its inventory.\n    Example 2: If the drones can hold 2 stacks (1 capacity upgrade), and you put in 10 drones, the request depot will dispatch drones until it has 20 stacks in its inventory.\n\nIn this way, you can adjust and tune the requested amount, to take into account factors such as the required throughput, the distance between the request and supply depots, etc. The request count can be overridden using Transport depot writers.\n\nAdditional controls in the Priority panel:\n - [font=default-bold]Max storage[/font]: Caps the total items the depot will request, regardless of drone count.\n - [font=default-bold]Ignore capacity research[/font]: Drones carry only their base capacity (1 stack), ignoring research bonuses.\n - [font=default-bold]Full stack only[/font]: Drones will only pick up full stacks, preventing small partial deliveries.\n\nThe setup of a request depot is simple:\n - Place the request depot on the road network.\n - Select the item to request.\n - Insert transport drones.\nThe request depot will first request fuel from the network. Once it has fuel, it will begin to dispatch drones to collect the requested item.
supply-depot=[font=default-bold]Supply depots[/font] (and fluid depots) are passive participants in the road network. They make their content available to the request depots in the road network.
road-network=The [font=default-bold]Road network[/font] is the system in which the depots are connected to each other, and the road over which the transport drones operate. Building the road network is done simply using the road tiles. Any connected road tiles are part of the same road network. Two disconnected areas of road tiles are separate road networks, and their depots will not supply each other.
buffer-depot=The [font=default-bold]Buffer depot[/font] acts as both a request depot and a supply depot.\n\nA good use case is for collecting ores from far away outposts, for distribution to many nearby request depots.The buffer depot can have a large number of drones, and the nearby request depots only need a 1 or 2 drones to handle the short trip from the requester to the buffer.
circuit-connectors=The Circuit connectors are the way of reading and writing signals to the depots and road network. They allow using logistic conditions and circuit network logic to control the behavior of the depots.
depot-reader=The [font=default-bold]Transport depot reader[/font] allows you to read data from any depot it is attached to.\n\nOutput modes:\n- [font=default-bold]Depot content[/font]: the items or fluids stored in the depot.\n- [font=default-bold]Network supply[/font]: total available across all supply depots in the network.\n- [font=default-bold]Network supply (excl. depot)[/font]: same but excludes the attached depot.\n\nExtra signals can be enabled to output drone count, active drones, fuel, capacity and stack information.
depot-writer=The [font=default-bold]Transport depot writer[/font] allows you to enable and disable the depots based on circuit/logistic conditions.\n    Example 1: Disabling a request depot will stop it sending drones to collect items.\n    Example 2: Disabling a supply depot will stop it from making its items available to the road network.
transport-depots=Transport depots are the entities in the road network which co-ordinate the transportation of items and fluids. They manage the content and requests of the road networks. They connect to the road network via the 'caution' plate on the ground, and this position is where the drones will be dispatched to and from.
network-reader=The [font=default-bold]Road network reader[/font] can read the content of the Road network that it is attached to. Open the reader and set one or more item/fluid signals in its slots. The reader will continuously update each signal with the total amount of that item available across all supply depots in the network.\n\nMultiple signals can be monitored simultaneously - each slot tracks a different item independently.\n\nThis lets you for instance, enable or disable certain production lines if the amount of ore in the road network falls below a certain value, or enable a reserve storage.
filtered-reader=The [font=default-bold]Road network reader (excluding depot)[/font] works like the standard road network reader, but excludes the attached depot's inventory from the totals.\n\nThis prevents circuit feedback loops when using network supply to control a supply depot. For example, if you want to disable a supply depot when the network has enough items, use this reader to avoid counting the depot's own items in the total.\n\nPlace it adjacent to a depot (like the depot reader/writer) with the direction pointing toward the depot.

