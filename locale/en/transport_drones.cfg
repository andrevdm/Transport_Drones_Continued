[mod-setting-description]
transport-depot-update-interval=How often (in ticks) each depot runs its update logic. Lower values = more responsive but higher UPS cost. Default: 60 ticks (1 second).
fuel-fluid=The fluid used as fuel for transport drones. All fuel depots must supply this fluid.
fuel-amount-per-drone=Amount of fuel fluid consumed per drone dispatch. Higher values increase fuel consumption per trip.
drone-fluid-capacity=Maximum amount of fuel fluid a fuel drone can carry per delivery trip.
fluid-depot-capacity=Maximum fluid storage capacity for fluid depots. Higher capacity allows more drones to be dispatched before the depot is full. A vanilla storage tank holds 25,000 for reference. Requires restart.
request-depot-fluid-capacity=Fluid output buffer capacity for request depots. Larger values increase fluid throughput into connected pipes. A vanilla storage tank holds 25,000 for reference. Requires restart.
fuel-consumption-per-meter=Fuel consumed per meter traveled by transport drones. Set to 0 to disable fuel consumption.
drone-pollution-per-second=Pollution emitted per second by each active transport drone. Set to 0 to disable drone pollution.
transport-drone-pathfinder-max-steps=Maximum pathfinder steps per tick. Higher values improve drone routing but cost UPS. Factorio default: 1000.
transport-drone-pathfinder-max-work=Maximum pathfinder work per tick. Higher values improve drone routing but cost UPS. Factorio default: 8000.
transport-drone-pathfinder-use-cache=Enable path caching for the global pathfinder. Disable for more accurate but costlier pathfinding. Factorio default: enabled.
transport-drone-sound-volume=Volume of the transport drone engine sound (0 = silent, 100 = default).
transport-drones-road-tile-whitelist=Comma-separated patterns for third-party tiles to treat as drone roads. Plain entries match item names (Lua patterns), @-prefixed entries match item subgroups. Default: ^Arci%-,^dect%-concrete%-grid$,@py-tiles. Requires restart.
transport-drones-diagonal-check=When enabled, drones cannot cut through diagonal corners between non-road tiles. Prevents drones from shortcutting through gaps. Requires restart.
transport-drone-load-balance-threshold=Supply depots with scores within this threshold of the best are treated as equivalent and one is chosen randomly. Spreads load across nearby depots. Set to 0 to always pick the single best depot.\n\nNote: this is a fixed score threshold, not a percentage. The score combines priority and distance, so depots with different priorities will have large score gaps that exceed this threshold. Load balancing works best when depots share the same priority.
transport-drone-priority-weight=When greater than 0, replaces the absolute priority system with a weighted bias: priority × weight. This makes priority a soft preference that can be outweighed by distance. 0 = absolute priority (default behavior).
transport-drone-max-dispatches-per-tick=Maximum number of drones a single depot can dispatch in one update cycle. Acts as a safety cap to prevent runaway dispatching in extreme scenarios. In normal play, natural limits (drone inventory, fuel) stop dispatching well before this cap. Increase for very large megabase setups with hundreds of drones per depot.
transport-drone-redispatch-interval=How often (in ticks) depots with pending demand re-attempt dispatching between regular update cycles. Lower values = smoother drone spawning but slightly more UPS. Default 5 ticks = 12 dispatch attempts per second. Set to 1 for maximum responsiveness.
transport-drones-space-platform-roads=Allow placing road tiles on space platform foundations. Disable if another mod needs to prevent tiles from being placed on space platform foundations. Requires restart.
active-depot-overfill-percent=Percentage by which active depots can overfill request depots beyond their normal storage limit. At 25%, a requester with a 200-item cap can receive up to 250 items from active depots. Set to 0 to enforce strict limits. The requester's own drones still respect the normal cap.
enable-drone-dispatcher=When enabled, the drone dispatcher building is available (unlocked with Transport System research). Disable to remove dispatchers from the game. Requires restart.
enable-active-depot=When enabled, the active depot building is available (unlocked with Transport Active Supply research). Disable to remove active depots from the game. Requires restart.
enable-storage-depot=When enabled, the storage depot building is available (unlocked with Transport Active Supply research). Disable to remove storage depots from the game. Requires restart.
enable-multi-pipe=When enabled, the Multi-pipe connections technology is available, unlocking extra east/west pipe connections on fluid depots. Requires restart.
transport-drone-stack-size=Number of transport drones per inventory stack. Affects how many drones fit in depot drone inventories. Requires restart.
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

