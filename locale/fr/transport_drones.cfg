allow-central-dispatch-label=Autoriser le dispatching central
allow-central-dispatch-tooltip=Lorsqu'active, le dispatcher de drones peut interagir avec ce depot - recuperer des objets des depots d'approvisionnement/actifs, ou livrer des objets aux depots de demande/tampon/stockage. Desactiver pour exclure ce depot du dispatching central tout en conservant ses propres operations de drones.

supply-threshold-label=Seuil d'approvisionnement :
supply-threshold-tooltip=Réserve cette quantité d'objets dans le dépôt. Seul l'excédent au-dessus du seuil est proposé au réseau routier. Laisser vide pour aucune réserve. Peut aussi être défini via un émetteur de circuit avec le signal [virtual-signal=signal-T].

allow-bots-label=Autoriser les robots logistiques
