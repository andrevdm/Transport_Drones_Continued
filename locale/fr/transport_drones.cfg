[mod-setting-description]
transport-depot-update-interval=Fréquence (en ticks) à laquelle chaque dépôt exécute sa logique de mise à jour. Valeurs basses = plus réactif mais plus coûteux en UPS. Par défaut : 60 ticks (1 seconde).
fuel-fluid=Le fluide utilisé comme carburant pour les drones de transport. Tous les dépôts de carburant doivent fournir ce fluide.
fuel-amount-per-drone=Quantité de carburant consommée par envoi de drone. Des valeurs élevées augmentent la consommation par trajet.
drone-fluid-capacity=Quantité maximale de carburant qu'un drone de carburant peut transporter par livraison.
fluid-depot-capacity=Capacité maximale de stockage de fluide pour les dépôts de fluides. Une capacité plus élevée permet d'envoyer plus de drones avant que le dépôt soit plein. Un réservoir de stockage standard contient 25 000 pour référence. Nécessite un redémarrage.
request-depot-fluid-capacity=Capacité du tampon de sortie fluide pour les dépôts demandeurs. Des valeurs plus élevées augmentent le débit dans les tuyaux connectés. Un réservoir standard contient 25 000 pour référence. Nécessite un redémarrage.
fuel-consumption-per-meter=Carburant consommé par mètre parcouru par les drones. Mettre à 0 pour désactiver la consommation.
drone-pollution-per-second=Pollution émise par seconde par chaque drone actif. Mettre à 0 pour désactiver la pollution des drones.
transport-drone-pathfinder-max-steps=Nombre max de pas du pathfinder par tick. Des valeurs élevées améliorent le routage des drones mais coûtent en UPS. Défaut Factorio : 1000.
transport-drone-pathfinder-max-work=Travail max du pathfinder par tick. Des valeurs élevées améliorent le routage des drones mais coûtent en UPS. Défaut Factorio : 8000.
transport-drone-pathfinder-use-cache=Active le cache de chemins du pathfinder global. Désactiver pour un routage plus précis mais plus coûteux. Défaut Factorio : activé.
transport-drone-sound-volume=Volume du son du moteur des drones de transport (0 = muet, 100 = par défaut).
transport-drones-road-tile-whitelist=Patrons séparés par des virgules pour les tuiles tierces à traiter comme routes de drones. Les entrées simples correspondent aux noms d'objets (patrons Lua), les entrées préfixées par @ correspondent aux sous-groupes. Par défaut : ^Arci%-,^dect%-concrete%-grid$,@py-tiles. Nécessite un redémarrage.
transport-drones-diagonal-check=Quand activé, les drones ne peuvent pas couper à travers les coins diagonaux entre des tuiles non-routières. Empêche les raccourcis à travers les trous. Nécessite un redémarrage.
transport-drone-load-balance-threshold=Les dépôts d'approvisionnement avec des scores dans ce seuil par rapport au meilleur sont traités comme équivalents et l'un est choisi aléatoirement. Répartit la charge entre les dépôts proches. Mettre à 0 pour toujours choisir le meilleur dépôt unique.
transport-drone-priority-weight=Lorsque supérieur à 0, remplace le système de priorité absolue par un biais pondéré : priorité × poids. La priorité devient une préférence souple qui peut être surpassée par la distance. 0 = priorité absolue (comportement par défaut).
transport-drone-max-dispatches-per-tick=Nombre maximum de drones qu'un seul dépôt peut expédier par cycle de mise à jour. Sert de plafond de sécurité contre les expéditions incontrôlées. En jeu normal, les limites naturelles (stock de drones, carburant) arrêtent l'expédition bien avant ce plafond. Augmenter pour les très grandes mégabases.
transport-drone-redispatch-interval=Fréquence (en ticks) à laquelle les dépôts avec une demande en attente retentent l'expédition entre les cycles réguliers. Valeurs basses = apparition plus fluide des drones, légèrement plus de UPS. Par défaut 5 ticks = 12 tentatives par seconde. Mettre à 1 pour une réactivité maximale.
transport-drones-space-platform-roads=Permet de placer des routes sur les fondations de plateformes spatiales. Désactiver si un autre mod doit empêcher la pose de tuiles sur les fondations. Nécessite un redémarrage.
active-depot-overfill-percent=Pourcentage par lequel les dépôts actifs peuvent surremplir les dépôts de demande au-delà de leur limite de stockage normale. À 25 %, un dépôt avec un plafond de 200 objets peut en recevoir jusqu'à 250 via les dépôts actifs. Mettre à 0 pour des limites strictes. Les drones du dépôt de demande respectent toujours le plafond normal.
enable-drone-dispatcher=Lorsque active, le batiment distributeur de drones est disponible (debloque avec la recherche Systeme de transport). Desactiver pour retirer les distributeurs du jeu. Necessite un redemarrage.
enable-active-depot=Lorsque active, le batiment depot actif est disponible (debloque avec la recherche Transport actif). Desactiver pour retirer les depots actifs du jeu. Necessite un redemarrage.
enable-storage-depot=Lorsque active, le batiment depot de stockage est disponible (debloque avec la recherche Transport actif). Desactiver pour retirer les depots de stockage du jeu. Necessite un redemarrage.
enable-multi-pipe=Lorsque active, la technologie Connexions multi-tuyaux est disponible, debloquant les connexions de tuyaux est/ouest supplementaires sur les depots de fluide. Necessite un redemarrage.
transport-drone-stack-size=Nombre de drones de transport par lot d'inventaire. Affecte combien de drones tiennent dans les inventaires de drones des depots. Necessite un redemarrage.
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

