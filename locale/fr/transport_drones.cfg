[transport_drones_pages]
welcome-1=Bienvenue dans Transport Drones !\nTransport Drones est un mod qui introduit une nouvelle méthode pour déplacer les matériaux dans votre usine.
fuel-depot-1=Tout transport au sein du réseau routier nécessite du carburant. Le carburant est livré par les [font=default-bold]Dépôts de carburant[/font].\n\nLe fonctionnement est simple :\n - Placez un dépôt de carburant sur le réseau routier.\n - Raccordez le carburant.\n - Ajoutez des drones de transport.\n\nLe dépôt de carburant enverra alors des drones approvisionner les autres dépôts du réseau.
drones-1=Les [font=default-bold]drones de transport[/font] sont les agents qui transportent les matériaux entre les dépôts. Ils ne sont jamais assignés qu'à un seul dépôt. Ils nécessitent du carburant pour fonctionner et produisent de la pollution en se déplaçant.
request-depot-1=Pour déplacer des objets dans le réseau routier, vous utilisez les [font=default-bold]Dépôts de demande[/font]. Ceux-ci envoient des drones vers le dépôt d'approvisionnement le plus proche disposant de l'objet demandé.\nLe nombre d'objets collectés dépend du nombre de drones dans le dépôt de demande. Pour chaque drone, le dépôt augmente sa demande de la capacité du drone.\n\n    Exemple 1 : Si les drones peuvent transporter 1 pile (sans améliorations) et que vous placez 5 drones, le dépôt enverra des drones jusqu'à avoir 5 piles en inventaire.\n    Exemple 2 : Si les drones peuvent transporter 2 piles (1 amélioration de capacité) et que vous placez 10 drones, le dépôt enverra des drones jusqu'à avoir 20 piles.\n\nVous pouvez ainsi ajuster la quantité demandée en tenant compte du débit requis, de la distance entre dépôts, etc. La quantité peut être remplacée par un émetteur de circuit.\n\nContrôles additionnels dans le panneau Priorité :\n - [font=default-bold]Stockage max[/font] : Limite le total d'objets que le dépôt demandera, indépendamment du nombre de drones.\n - [font=default-bold]Ignorer la recherche de capacité[/font] : Les drones ne transportent que leur capacité de base (1 pile), ignorant les bonus de recherche.\n - [font=default-bold]Pile complète uniquement[/font] : Les drones ne collecteront que des piles complètes, empêchant les petites livraisons partielles.\n\nLa configuration d'un dépôt de demande est simple :\n - Placez le dépôt sur le réseau routier.\n - Sélectionnez l'objet à demander.\n - Insérez des drones de transport.\nLe dépôt demandera d'abord du carburant au réseau. Une fois alimenté, il commencera à envoyer des drones collecter l'objet demandé.
supply-depot=Les [font=default-bold]dépôts d'approvisionnement[/font] (et les dépôts de fluide) sont des participants passifs du réseau routier. Ils mettent leur contenu à disposition des dépôts de demande du réseau.
road-network=Le [font=default-bold]réseau routier[/font] est le système qui relie les dépôts entre eux, et la route sur laquelle les drones circulent. La construction du réseau se fait simplement avec des tuiles de route. Toutes les tuiles connectées font partie du même réseau. Deux zones de tuiles déconnectées forment des réseaux séparés dont les dépôts ne s'approvisionnent pas mutuellement.
buffer-depot=Le [font=default-bold]dépôt buffer[/font] fonctionne à la fois comme un dépôt de demande et un dépôt d'approvisionnement.\n\nUn bon usage est de collecter du minerai depuis des avant-postes éloignés pour le distribuer à de nombreux dépôts de demande proches. Le dépôt buffer peut avoir beaucoup de drones, tandis que les dépôts de demande proches n'ont besoin que de 1 ou 2 drones pour le court trajet.
circuit-connectors=Les connecteurs de circuit permettent de lire et d'écrire des signaux vers les dépôts et le réseau routier. Ils permettent d'utiliser des conditions logistiques et la logique du réseau de circuits pour contrôler le comportement des dépôts.
depot-reader=Le [font=default-bold]lecteur de depot[/font] permet de lire les donnees de tout depot auquel il est connecte.\n\nModes de sortie :\n- [font=default-bold]Contenu du depot[/font] : les objets ou fluides stockes dans le depot.\n- [font=default-bold]Approvisionnement reseau[/font] : total disponible dans tous les depots d'approvisionnement du reseau.\n- [font=default-bold]Approvisionnement reseau (excl. depot)[/font] : idem mais exclut le depot connecte.\n\nDes signaux supplementaires peuvent etre actives : nombre de drones, drones actifs, carburant, capacite et informations de piles.
depot-writer=L'[font=default-bold]émetteur de dépôt[/font] permet d'activer et désactiver les dépôts selon des conditions de circuit ou logistiques.\n    Exemple 1 : Désactiver un dépôt de demande empêchera l'envoi de drones.\n    Exemple 2 : Désactiver un dépôt d'approvisionnement empêchera ses objets d'être disponibles sur le réseau.
transport-depots=Les dépôts de transport sont les entités du réseau routier qui coordonnent le transport d'objets et de fluides. Ils gèrent le contenu et les demandes des réseaux. Ils se connectent au réseau via la plaque « attention » au sol, d'où les drones sont envoyés et reçus.
network-reader=Le [font=default-bold]lecteur de réseau routier[/font] peut lire le contenu du réseau auquel il est connecté. Ouvrez le lecteur et définissez un ou plusieurs signaux d'objets/fluides dans ses emplacements. Le lecteur mettra continuellement à jour chaque signal avec la quantité totale de cet objet disponible dans tous les dépôts d'approvisionnement du réseau.\n\nPlusieurs signaux peuvent être surveillés simultanément - chaque emplacement suit un objet différent de manière indépendante.\n\nCela permet par exemple d'activer ou désactiver certaines lignes de production si la quantité de minerai dans le réseau tombe sous une certaine valeur, ou d'activer un stockage de réserve.
filtered-reader=Le [font=default-bold]lecteur de réseau routier (excluant le dépôt)[/font] fonctionne comme le lecteur de réseau routier standard, mais exclut l'inventaire du dépôt connecté des totaux.\n\nCela empêche les boucles de rétroaction lors de l'utilisation de l'approvisionnement réseau pour contrôler un dépôt d'approvisionnement. Par exemple, si vous souhaitez désactiver un dépôt quand le réseau a suffisamment d'objets, utilisez ce lecteur pour ne pas compter les propres objets du dépôt dans le total.\n\nÀ placer à côté d'un dépôt (comme le lecteur/émetteur de dépôt) avec la direction pointant vers le dépôt.

