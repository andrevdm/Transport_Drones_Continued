[item-description]
transport-drone=Transporte des objets entre les dépôts sur le réseau routier.\n[font=default-bold]Bonus de qualité :[/font]\n  Vitesse : +15% inhabituelle, +30% rare, +50% épique, +80% légendaire.\n  Économie de carburant : 10% inhabituelle, 20% rare, 30% épique, 45% légendaire.

[entity-description]
request-depot=Envoie des drones collecter des objets depuis les dépôts d'approvisionnement du réseau routier.\n[font=default-bold]Qualité :[/font] Emplacements de drones : 5/6/7/8/10.
supply-depot=Met son inventaire à disposition du réseau routier.\n[font=default-bold]Qualité :[/font] Inventaire : 80/100/125/175/250 emplacements.
supply-depot-chest=Met son inventaire à disposition du réseau routier. Peut optionnellement permettre aux robots logistiques de prélever des objets (fournisseur passif).\n[font=default-bold]Qualité :[/font] Inventaire : 80/100/125/175/250 emplacements.
buffer-depot=Fonctionne à la fois comme dépôt de demande et d'approvisionnement.\n[font=default-bold]Qualité :[/font] Emplacements de drones : 5/6/7/8/10.
fuel-depot=Livre du carburant aux autres dépôts du réseau routier.\n[font=default-bold]Qualité :[/font] Emplacements de drones : 5/6/7/8/10.
active-depot=Pousse activement les objets de son inventaire vers les dépôts de demande du réseau routier. Aucune recette nécessaire - insérez les objets via convoyeurs ou bras robotiques.\n[font=default-bold]Qualité :[/font] Inventaire : 80/100/125/175/250 emplacements. Emplacements de drones : 5/6/7/8/10.
active-depot-chest=Stockage interne du dépôt actif. Les objets insérés ici sont automatiquement poussés vers les dépôts de demande.
storage-depot=Entrepot passif pour le reseau routier. Les depots de demande y prelevent des objets comme d'un depot d'approvisionnement. Les depots actifs y poussent les objets excedentaires.\n[font=default-bold]Qualite :[/font] Inventaire : 80/100/125/175/250 emplacements.
storage-depot-chest=Entrepot passif pour le reseau routier. Les depots de demande y prelevent des objets comme d'un depot d'approvisionnement. Les depots actifs y poussent les objets excedentaires.\n[font=default-bold]Qualite :[/font] Inventaire : 80/100/125/175/250 emplacements.
fluid-depot=Met son inventaire de fluides à disposition du réseau routier.
transport-depot-reader=Transmet le contenu du depot ou l'approvisionnement reseau sous forme de signaux de circuit. Utilisez l'interface pour basculer entre le contenu du depot, l'approvisionnement reseau complet ou l'approvisionnement reseau excluant ce depot.
transport-depot-writer=Contrôle le dépôt connecté via des conditions de circuit ou logistiques. Peut aussi remplacer la quantité demandée pour les dépôts de demande/buffer. Lit [virtual-signal=signal-P] depuis les fils pour remplacer la priorité du dépôt. Lit [virtual-signal=signal-T] pour remplacer le seuil d'approvisionnement.
road-network-reader=Lit la quantité totale des objets sélectionnés dans tous les dépôts d'approvisionnement du réseau routier. Supporte plusieurs signaux simultanément.
road-network-reader-filtered=Lit l'approvisionnement total du réseau routier, en excluant l'inventaire du dépôt connecté. À placer à côté d'un dépôt d'approvisionnement ou tampon. Empêche les boucles de rétroaction des circuits.
depot-drone-chest=Stocke les drones de transport pour ce dépôt. Le nombre d'emplacements augmente avec la qualité du dépôt. Supporte la livraison par robots logistiques.
drone-dispatcher=Accepte les drones de transport via insereurs ou robots. Se connecte au reseau routier pour la distribution de drones.\n[font=default-bold]Qualite :[/font] Inventaire : 10/12/14/16/20 emplacements.
drone-dispatcher-chest=Accepte les drones de transport via insereurs ou robots. Se connecte au reseau routier pour la distribution de drones.\n[font=default-bold]Qualite :[/font] Inventaire : 10/12/14/16/20 emplacements.

