writer-use-as-limit=신호 값을 최대 아이템으로 사용
writer-use-as-limit-tooltip=와이어에서 가장 높은 아이템/유체 신호 값을 이 창고의 저장 한도로 사용합니다. 최대 드론 슬롯 × 용량으로 제한됩니다.
writer-set-recipe=신호에서 레시피 강제
writer-set-recipe-tooltip=와이어의 첫 번째 아이템/유체 신호로 창고 레시피를 강제합니다.
writer-no-signal=와이어에 신호 없음
writer-condition-label=활성화/비활성화 조건:
writer-condition-tooltip=이 조건이 충족될 때 창고가 활성화됩니다. 신호를 지우면 회로 제어가 비활성화됩니다.
