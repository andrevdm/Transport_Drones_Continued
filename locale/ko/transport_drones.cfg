storage-limit-override-tooltip=회로 라이터 또는 수동 저장 한도 설정으로 재정의됨
filter-label-tooltip=모든 탭을 특정 아이템 또는 유체 신호로 필터링
network-dropdown-tooltip=표시할 도로 네트워크를 선택
surface-dropdown-tooltip=표시할 행성 또는 표면을 선택
drone-open-inventory-tooltip=드론 보관함을 열어 운송 드론 관리
drone-back-to-depot-tooltip=상위 창고로 돌아가기
priority-signal-chooser-tooltip=우선순위 재정의를 위해 회로 와이어에서 읽을 가상 신호
supply-threshold-signal-tooltip=회로 와이어의 신호 [virtual-signal=signal-T]가 공급 임계값을 재정의합니다
channel-signal-tooltip=회로 와이어의 신호 [virtual-signal=signal-C]가 채널을 재정의합니다

writer-gui-title=운송창고 신호 입력기
writer-not-attached=어떤 창고에도 연결되지 않았습니다.\n화살표가 창고를 향하도록 배치하십시오.
