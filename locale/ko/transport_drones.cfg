[item-description]
transport-drone=도로 네트워크에서 운송창고 간 아이템을 운송합니다.\n[font=default-bold]품질 보너스:[/font]\n  속도: +15% 고급, +30% 희귀, +50% 서사, +80% 전설.\n  연료 절감: 10% 고급, 20% 희귀, 30% 서사, 45% 전설.

[entity-description]
request-depot=도로 네트워크의 보급 운송창고에서 아이템을 수거하기 위해 드론을 파견합니다.\n[font=default-bold]품질:[/font] 드론 슬롯: 5/6/7/8/10.
supply-depot=자신의 재고를 도로 네트워크에 제공합니다.\n[font=default-bold]품질:[/font] 재고: 80/100/125/175/250 슬롯.
supply-depot-chest=자신의 재고를 도로 네트워크에 제공합니다. 선택적으로 물류 로봇이 아이템을 가져갈 수 있습니다 (수동 공급자).\n[font=default-bold]품질:[/font] 재고: 80/100/125/175/250 슬롯.
buffer-depot=요청 운송창고와 보급 운송창고의 역할을 겸합니다.\n[font=default-bold]품질:[/font] 드론 슬롯: 5/6/7/8/10.
fuel-depot=도로 네트워크의 다른 창고에 연료를 배달합니다.\n[font=default-bold]품질:[/font] 드론 슬롯: 5/6/7/8/10.
active-depot=재고의 아이템을 도로 네트워크의 요청 운송창고에 능동적으로 배송합니다. 레시피 불필요 - 벨트나 인서터로 아이템을 투입하세요.\n[font=default-bold]품질:[/font] 재고: 80/100/125/175/250 슬롯. 드론 슬롯: 5/6/7/8/10.
active-depot-chest=능동 운송창고의 내부 저장소. 여기에 투입된 아이템은 자동으로 요청 운송창고에 배송됩니다.
storage-depot=도로 네트워크의 수동 창고. 요청 창고가 공급 창고처럼 아이템을 가져갑니다. 활성 창고가 초과 아이템을 보냅니다.\n[font=default-bold]품질:[/font] 인벤토리: 80/100/125/175/250 슬롯.
storage-depot-chest=도로 네트워크의 수동 창고. 요청 창고가 공급 창고처럼 아이템을 가져갑니다. 활성 창고가 초과 아이템을 보냅니다.\n[font=default-bold]품질:[/font] 인벤토리: 80/100/125/175/250 슬롯.
fluid-depot=자신의 유체 재고를 도로 네트워크에 제공합니다.
transport-depot-reader=창고 내용 또는 네트워크 공급을 회로 신호로 출력합니다. GUI에서 창고 내용, 전체 네트워크 공급 또는 이 창고를 제외한 네트워크 공급 간 전환합니다.
transport-depot-writer=회로 또는 물류 조건으로 연결된 창고를 제어합니다. 요청/완충 운송창고의 요청량을 재정의할 수도 있습니다. 와이어에서 [virtual-signal=signal-P] 신호를 읽어 창고 우선순위를 재정의합니다. [virtual-signal=signal-T] 신호를 읽어 공급 임계값을 재정의합니다.
road-network-reader=도로 네트워크의 모든 보급 운송창고에서 선택한 아이템의 총량을 읽습니다. 여러 신호를 동시에 지원합니다.
road-network-reader-filtered=연결된 저장소의 재고를 제외하고 도로 네트워크의 총 공급량을 읽습니다. 공급 저장소 또는 버퍼 저장소 옆에 배치하세요. 회로 피드백 루프를 방지합니다.
depot-drone-chest=이 창고의 운송 드론을 보관합니다. 슬롯 수는 창고 품질에 따라 증가합니다. 물류 로봇 배달을 지원합니다.
drone-dispatcher=인서터나 로봇을 통해 운송 드론을 받습니다. 도로 네트워크에 연결하여 드론을 배분합니다.\n[font=default-bold]품질:[/font] 인벤토리: 10/12/14/16/20 슬롯.
drone-dispatcher-chest=인서터나 로봇을 통해 운송 드론을 받습니다. 도로 네트워크에 연결하여 드론을 배분합니다.\n[font=default-bold]품질:[/font] 인벤토리: 10/12/14/16/20 슬롯.

