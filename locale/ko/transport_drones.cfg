reader-mode-tooltip=출력기의 출력을 선택:\n- 창고 내용: 이 창고의 아이템\n- 네트워크 공급: 모든 공급 창고의 총량\n- 네트워크 공급 (제외): 동일하지만 이 창고 제외
reader-extra-signals=추가 신호
