[mod-setting-description]
transport-depot-update-interval=각 창고가 업데이트 로직을 실행하는 빈도(틱). 낮은 값 = 더 빠른 반응, 하지만 UPS 비용 증가. 기본값: 60틱 (1초).
fuel-fluid=운송 드론의 연료로 사용되는 유체. 모든 연료 운송창고는 이 유체를 공급해야 합니다.
fuel-amount-per-drone=드론 파견당 소비되는 연료량. 높은 값은 트립당 연료 소비를 증가시킵니다.
drone-fluid-capacity=연료 드론이 한 번의 배달에서 운반할 수 있는 최대 연료량.
fluid-depot-capacity=유체 운송창고의 최대 유체 저장 용량. 용량이 클수록 창고가 가득 차기 전에 더 많은 드론을 파견할 수 있습니다. 기본 저장 탱크는 25,000을 참고하세요. 재시작 필요.
request-depot-fluid-capacity=요청 창고의 유체 출력 버퍼 용량. 값이 클수록 연결된 파이프로의 유체 처리량이 증가합니다. 기본 저장 탱크는 25,000을 참고하세요. 재시작 필요.
fuel-consumption-per-meter=운송 드론이 미터당 소비하는 연료. 0으로 설정하면 연료 소비를 비활성화합니다.
drone-pollution-per-second=각 활동 중인 드론이 초당 배출하는 오염량. 0으로 설정하면 드론 오염을 비활성화합니다.
transport-drone-pathfinder-max-steps=틱당 최대 경로 탐색 단계. 값이 높을수록 드론 경로가 개선되지만 UPS가 감소합니다. Factorio 기본값: 1000.
transport-drone-pathfinder-max-work=틱당 최대 경로 탐색 작업량. 값이 높을수록 드론 경로가 개선되지만 UPS가 감소합니다. Factorio 기본값: 8000.
transport-drone-pathfinder-use-cache=글로벌 경로 탐색기의 경로 캐싱을 활성화합니다. 비활성화하면 더 정확하지만 비용이 높은 경로 탐색을 수행합니다. Factorio 기본값: 활성화.
transport-drone-sound-volume=운송 드론 엔진 소리의 크기 (0 = 무음, 100 = 기본값).
transport-drones-road-tile-whitelist=드론 도로로 취급할 서드파티 타일의 쉼표로 구분된 패턴. 일반 항목은 아이템 이름(Lua 패턴)과, @접두사 항목은 하위 그룹과 일치합니다. 기본값: ^Arci%-,^dect%-concrete%-grid$,@py-tiles. 재시작 필요.
transport-drones-diagonal-check=활성화하면 드론이 비도로 타일 사이의 대각선 모서리를 통과할 수 없습니다. 틈을 통한 지름길을 방지합니다. 재시작이 필요합니다.
transport-drone-load-balance-threshold=최고 점수와의 차이가 이 임계값 이내인 보급 운송창고를 동등하게 취급하고 무작위로 선택합니다. 인근 창고 간 부하를 분산합니다. 0으로 설정하면 항상 최적의 창고를 선택합니다.
transport-drone-priority-weight=0보다 클 경우, 절대 우선순위 시스템을 가중 편향으로 대체합니다: 우선순위 × 가중치. 우선순위가 거리에 의해 상쇄될 수 있는 유연한 선호도가 됩니다. 0 = 절대 우선순위 (기본 동작).
transport-drone-max-dispatches-per-tick=단일 창고가 한 업데이트 주기에 파견할 수 있는 최대 드론 수. 극단적인 상황에서 과도한 파견을 방지하는 안전 상한선입니다. 일반 플레이에서는 자연적 제한(드론 재고, 연료)이 이 상한선보다 훨씬 먼저 파견을 중지합니다. 창고당 수백 대의 드론이 있는 대규모 메가베이스의 경우 값을 높이세요.
transport-drone-redispatch-interval=대기 중인 수요가 있는 창고가 정규 업데이트 주기 사이에 재파견을 시도하는 빈도(틱). 낮은 값 = 더 부드러운 드론 생성, 약간의 UPS 증가. 기본값 5틱 = 초당 12회 파견 시도. 최대 반응성을 위해 1로 설정하세요.
transport-drones-space-platform-roads=우주 플랫폼 기초 위에 도로 타일을 배치할 수 있습니다. 다른 모드가 플랫폼 기초 위에 타일 배치를 방지해야 하는 경우 비활성화하세요. 재시작 필요.
active-depot-overfill-percent=능동 운송창고가 요청 운송창고의 정상 저장 한도를 초과하여 채울 수 있는 비율. 25%에서 200개 한도의 요청 창고는 능동 운송창고로부터 최대 250개를 받을 수 있습니다. 0으로 설정하면 엄격한 한도가 적용됩니다. 요청 창고 자체의 드론은 여전히 정상 한도를 따릅니다.
enable-drone-dispatcher=활성화 시, 드론 디스패처 건물을 사용할 수 있습니다 (운송 시스템 연구로 해제). 비활성화하면 게임에서 디스패처가 제거됩니다. 재시작 필요.
enable-active-depot=활성화 시, 능동 운송창고 건물을 사용할 수 있습니다 (능동 수송 연구로 해제). 비활성화하면 게임에서 능동 운송창고가 제거됩니다. 재시작 필요.
enable-storage-depot=활성화 시, 저장 운송창고 건물을 사용할 수 있습니다 (능동 수송 연구로 해제). 비활성화하면 게임에서 저장 운송창고가 제거됩니다. 재시작 필요.
enable-multi-pipe=활성화 시, 다중 파이프 연결 기술이 사용 가능해지며, 유체 창고에 동/서 추가 파이프 연결이 해제됩니다. 재시작 필요.
transport-drone-stack-size=인벤토리 스택당 운송 드론 수. 저장소의 드론 인벤토리에 들어가는 드론 수에 영향을 줍니다. 재시작이 필요합니다.
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

