dispatcher-desc=파란 슬롯에 드론을 넣으세요. 디스패처가 필요한 정거장에 드론을 보내고 초과분을 회수합니다. 빨간 슬롯은 귀환 드론용이며 우선 배송됩니다.
central-dispatch-label=중앙 배송
central-dispatch-tooltip=활성화 시, 디스패처가 자체 드론을 사용하여 공급/활성 창고에서 아이템을 수거하고, 수요가 있는 요청/버퍼/저장 창고에 배달합니다.
central-dispatch-slider-label=드론 할당:
central-dispatch-slider-tooltip=디스패처 재고 드론 중 중앙 배송에 사용할 수 있는 최대 비율.

storage-limit-label=최대 저장량:
storage-limit-tooltip=드론 수와 관계없이 이 창고가 요청하는 총 아이템 수를 제한합니다. 기본 동작(드론 수 × 용량)을 사용하려면 비워 두세요. 회로 기록기로도 설정 가능합니다.
ignore-capacity-label=용량 연구 무시
ignore-capacity-tooltip=활성화 시, 드론은 기본 용량(1 스택)만 운반하며 용량 연구 보너스를 무시합니다.
full-stack-only-label=풀 스택만
full-stack-only-tooltip=활성화 시, 드론은 보급 창고에서 풀 스택만 수거합니다. 소량 부분 배송을 방지합니다.
quality-label=품질:
quality-tooltip=도로 네트워크에서 요청할 아이템의 품질을 선택합니다.
transfer-to-depot-label=아이템 전송:
transfer-to-depot-tooltip=일치하는 아이템을 인벤토리에서 이 저장소로 전송합니다.
transfer-all-to-depot=전부
transfer-all-to-depot-tooltip=일치하는 모든 아이템을 인벤토리에서 이 저장소로 전송합니다.
transfer-stack-to-depot=x1
transfer-stack-to-depot-tooltip=일치하는 아이템 1스택을 인벤토리에서 이 저장소로 전송합니다.

channel-label=채널:
channel-tooltip=네트워크 분리를 위한 비트마스크 채널. 창고는 채널이 최소 하나의 비트를 공유할 때만 상호작용합니다 (비트 AND ≠ 0).\n\n-1 = 모든 채널 (기본값)\n1, 2, 4, 8... = 개별 채널\n3 = 채널 1 + 2\n\nLTN 네트워크 ID와 유사합니다.

allow-central-dispatch-label=중앙 배차 허용
allow-central-dispatch-tooltip=활성화하면 드론 디스패처가 이 창고와 상호작용할 수 있습니다 - 공급/활성 창고에서 아이템을 수거하거나 요청/버퍼/저장 창고에 아이템을 배달합니다. 비활성화하면 자체 드론 운영을 유지하면서 중앙 배차에서 제외합니다.

supply-threshold-label=공급 임계값:
supply-threshold-tooltip=이 수량만큼의 아이템을 창고에 예약합니다. 임계값 초과분만 도로 네트워크에 제공됩니다. 비워 두면 예약 없음. 회로 기록기에서 [virtual-signal=signal-T] 신호를 사용하여 설정할 수도 있습니다.

allow-bots-label=물류 로봇 허용
allow-bots-tooltip=활성화 시, 수동 공급자로 작동하여 물류 로봇이 이 창고에서 아이템을 가져갈 수 있습니다.
allow-bots-tooltip-locked=수송 물류 연구가 필요합니다.

fluid-mode-label=유체 모드
fluid-mode-tooltip=활성화 시, 창고는 상자의 아이템 대신 남쪽 파이프의 유체를 밀어냅니다. 유체를 공급하려면 파이프를 연결하세요.
fluid-mode-confirm-title=모드 전환 확인
fluid-mode-confirm-message=창고에 현재 모드의 아이템 또는 유체가 남아 있습니다. 전환하면 파괴됩니다. 계속하시겠습니까?
fluid-mode-confirm-yes=확인
fluid-mode-confirm-no=취소

storage-filter-label=저장 필터:
storage-filter-tooltip=이 창고를 필터링할 아이템 또는 유체를 선택합니다. 선택한 유형만 저장할 수 있습니다. 능동 운송창고는 일치하는 아이템을 이 창고에 보냅니다.

multi-pipe-label=추가 파이프 연결
multi-pipe-tooltip=활성화 시, 창고의 저장 유체 탱크에 동쪽 및 서쪽 파이프 연결을 추가합니다. 더 많은 파이프를 연결하여 병렬 유체 입출력이 가능합니다.
multi-pipe-tooltip-fluid=추가 파이프 연결을 사용하려면 먼저 유체 모드를 활성화하세요.
multi-pipe-tooltip-locked=다중 파이프 연결 연구가 필요합니다.

map-button-tooltip=클릭하여 이 창고로 화면 이동
drones-active-available-tooltip=활동 중인 드론은 아이템을 배달하고 있습니다. 대기 중인 드론은 파견 대기 상태입니다.
drone-bar-tooltip=__1__% 대기 중
dispatcher-user-bar-tooltip=입력 슬롯: __1__ / __2__
dispatcher-return-bar-tooltip=반환 슬롯: __1__ / __2__
priority-slider-tooltip=우선순위 (0-100). 높은 값이 보급 선택에서 우선됩니다.\n회로 신호 [virtual-signal=signal-P]로 재정의할 수 있습니다.
priority-override-tooltip=회로 신호 [virtual-signal=signal-P]에 의해 재정의됨
channel-override-tooltip=회로 신호 [virtual-signal=signal-C]에 의해 재정의됨
