[transport_drones_pages]
welcome-1=운송 드론 모드에 어서오세요!\n운송 드론은 재료를 옮기는 새로운 방법을 추가하는 모드입니다.
fuel-depot-1=도로 네트워크을 통한 모든 운송은 연료를 필요로 합니다. 연료는 [font=default-bold]연료 운송창고[/font]에서 운송할 것입니다.\n\n방법은 간단합니다.\n - 연료 운송창고를 도로 네트워크에 배치합니다.\n - 연료를 공급합니다.\n - 운송 드론을 추가합니다.\n\n이제 연료 운송창고가 운송 드론을 통해 도로 네트워크 안에 연료를 제공할 것입니다.
drones-1=[font=default-bold]운송 드론[/font]은 운송창고간에 재료를 운송합니다.\n운송 드론은 하나의 운송창고에 소속됩니다. 운송에는 연료가 소모되며, 운송 중에는 공해도 생성할 것입니다.
request-depot-1=도로 네트워크에서 아이템을 옮기기 위해서는, [font=default-bold]요청 운송창고[/font]를 사용합니다. [font=default-bold]요청 운송창고[/font]에 운송 드론을 추가하면 가장 가까운 보급 운송창고에서 요청된 아이템을 가져올 것입니다.\n운송창고에 모이는 아이템의 총량은 요청 운송창고에 추가된 운송 드론의 수에 따라 정해집니다. 요청하는 아이템 양은 운송창고에 추가된 모든 드론의 운반량의 합입니다.\n\n    예시 1: 만약 드론이 1 묶음을 운반할 수 있고 (업그레이드 없음), 5 드론을 추가한다면, 요청 운송창고는 인벤토리에 5 묶음을 가져올 것입니다.\n    예시 2: 만약 드론이 2 묶음을 운반할 수 있고 (1 운반량 업그레이드), 10 드론을 추가한다면, 요청 운송창고는 인벤토리에 20 묶음을 가져올 것입니다.\n\n이렇게 드론 수, 보급 운송창고와 요청 운송창고간의 거리 등을 이용해 요청량을 조정할 수 있습니다. 또한, 운송창고 신호 입력기로 드론과 상관없이 요청량을 제어할 수도 있습니다.\n\n우선순위 패널의 추가 제어:\n - [font=default-bold]최대 저장량[/font]: 드론 수와 관계없이 창고가 요청하는 총 아이템 수를 제한합니다.\n - [font=default-bold]용량 연구 무시[/font]: 드론은 기본 용량(1 스택)만 운반하며 연구 보너스를 무시합니다.\n - [font=default-bold]풀 스택만[/font]: 드론은 풀 스택만 수거하여 소량 부분 배송을 방지합니다.\n\n요청 운송창고의 설정은 간단합니다:\n - 요청 운송창고를 도로 네트워크에 배치합니다.\n - 요청할 아이템을 선택합니다.\n - 운송 드론을 투입합니다.\n요청 운송창고는 먼저 네트워크 안에서 연료를 요청할 것입니다. 연료가 충전되면, 운송 드론을 보내 요청한 아이템을 가져올 것입니다.
supply-depot=[font=default-bold]보급 운송창고[/font](및 유체 운송창고)는 아이템을 도로 네트워크에 공급합니다.\n요청 운송창고는 이 둘으로부터 아이템을 가져옵니다.
road-network=[font=default-bold]도로 네트워크[/font]는 운송창고를 이어주고, 드론을 보내도록 하는 네트워크입니다.\n도로 타일을 설치하면 도로 네트워크가 완성되며, 타일로 연결된 부분은 어디서나 같은 도로 네트워크로 취급합니다. 서로 연결되지 않은 도로 타일은 다른 도로 네트워크가 되며, 운송창고가 연결되지 않습니다.
buffer-depot=[font=default-bold]완충 운송창고[/font]는 요청 운송창고와 보급 운송창고의 기능을 겸합니다.\n\n먼 거점에서 원료를 가져와, 가까운 운송창고에 보급하는게 좋은 예입니다. 완충 운송창고에 많은 드론을 추가해두면, 요청 운송창고의 운송거리가 짧아지고 드론을 적게 사용할 수 있습니다.
circuit-connectors=도로 네트워크나 운송창고를 회로 네트워크에 연결하는 아이템입니다. 회로 네트워크의 신호와 조건을 통해 운송창고를 제어할 수 있습니다.
depot-reader=[font=default-bold]운송창고 신호 출력기[/font]는 연결된 창고의 데이터를 읽어 신호로 출력합니다.\n\n출력 모드:\n- [font=default-bold]창고 내용[/font]: 창고에 저장된 아이템 또는 유체.\n- [font=default-bold]네트워크 공급[/font]: 네트워크 내 모든 공급 창고의 총량.\n- [font=default-bold]네트워크 공급 (창고 제외)[/font]: 동일하지만 연결된 창고를 제외.\n\n추가 신호를 활성화할 수 있습니다: 드론 수, 활성 드론, 연료, 용량 및 스택 정보.
depot-writer=[font=default-bold]운송창고 신호 입력기[/font]는 회로 신호와 조건을 통해 운송창고를 제어할 수 있게 해줍니다.\n    예시 1: 요청 운송창고를 비활성화하면 대상 운송창고에서 운송 드론을 내보낼 수 없게합니다.\n    예시 2: 보급 운송창고를 비활성화하면 운송 드론이 대상 운송창고에서 아이템을 가져갈 수 없게 합니다.
transport-depots=운송창고는 도로 네트워크 안에서 아이템과 유체를 운송하는 엔티티입니다.\n도로 네트워크의 아이템과 요청을 관리합니다. 'caution' 표시가 있는 도로 타일을 통해 연결되며, 드론은 이 타일에서 상/하차를 수행합니다.
network-reader=[font=default-bold]도로 네트워크 신호 출력기[/font]는 연결된 도로 네트워크의 내용을 읽을 수 있습니다. 리더를 열어 슬롯에 하나 이상의 아이템/유체 신호를 설정하세요. 리더는 네트워크 내 모든 보급 운송창고에서 각 아이템의 총량을 지속적으로 업데이트합니다.\n\n여러 신호를 동시에 모니터링할 수 있습니다 - 각 슬롯이 독립적으로 다른 아이템을 추적합니다.\n\n예를 들어 도로망의 광석 양이 특정 값 이하로 떨어지면, 특정 생산 라인을 활성화/비활성화하거나 예비 저장을 활성화할 수 있습니다.
filtered-reader=[font=default-bold]도로 네트워크 리더 (저장소 제외)[/font]는 표준 도로 네트워크 리더와 동일하게 작동하지만, 연결된 창고의 재고를 합계에서 제외합니다.\n\n네트워크 공급량을 사용하여 보급 운송창고를 제어할 때 피드백 루프를 방지합니다. 예를 들어 네트워크에 충분한 아이템이 있을 때 창고를 비활성화하려면, 이 리더를 사용하여 창고 자체의 아이템을 합계에 포함하지 않도록 하세요.\n\n디포 리더/기록기처럼 창고 옆에 방향을 창고 쪽으로 향하게 배치하세요.

