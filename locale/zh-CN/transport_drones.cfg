[transport_drones_pages]
welcome-1=欢迎使用运输无人车！\n运输无人车是一个引入了在你的工厂移动材料新方法的模组。
fuel-depot-1=运输网络内的所有运输都需要燃料。燃料是由[font=default-bold]燃料仓储[/font]运送。\n\n操作简便：\n - 在运输网络上放置一个燃料仓储。\n - 接入燃料。\n - 添加运输无人车。\n\n现在燃料仓储将会派遣运输无人车去运输网络上的燃料仓储。
drones-1=[font=default-bold]运输无人车[/font]是仓储之间运输材料的媒介。他们只能被分配到唯一的仓储。他们需要燃料才能工作，并且他们行使时会产生污染。
request-depot-1=向运输网络中添加物品，使用[font=default-bold]请求仓储[/font]。它们会派遣无人车去最近的供货仓储去取请求的物品。\n请求仓储收集的物品数量取决于请求仓储中的无人车数量。对于每个无人车，请求仓储会根据它的运量增加对它的请求数量。\n\n    示例 1：如果无人车可运送1格（未升级）并且你放入了5个无人车，请求仓储会派遣无人车直到它存满5格物品。\n    示例 2：如果无人车可运送2格（升级1次）并且你放入了10个无人车，请求仓储会派遣无人车直到它存够20格物品。\n\n所以，你可以调整请求的数量，考虑诸如所需吞吐量、请求和供货仓储之间的距离等因素。请求数量可以被运输仓储写入器控制。\n\n优先级面板的附加控制：\n - [font=default-bold]最大存储[/font]：限制此仓储请求的物品总数，与无人机数量无关。\n - [font=default-bold]忽略容量研究[/font]：无人机仅携带基础容量（1组），忽略研究加成。\n - [font=default-bold]仅满组取货[/font]：无人机仅取走满组物品，防止小批量部分运输。\n\n设置一个请求仓储很简单：\n - 在运输网络上放置一个请求仓储。\n - 选择要请求的物品。\n - 放入运输无人车。\n运输无人车会先从网络中请求燃料。一旦有了燃料，它会开始派遣无人车去收集请求的物品。
supply-depot=[font=default-bold]供货仓储[/font]（和流体仓储）是被动参与运输网络。他们使库存对运输网络中的请求仓储可用。
road-network=[font=default-bold]运输网络[/font]是一个使仓储互联的系统，以及是运输无人车运行的道路。建设运输网络就是简单的使用道路石砖。任何相连的道路石砖都属于同一个运输网络。两个不相连的道路石砖是独立的运输网络，他们的仓储将不会互相供货。
buffer-depot=[font=default-bold]缓存仓储[/font]具备请求仓储和供货仓储的双重功能。\n\n一个很好的使用例子是从很远的货源收集矿石，然后分配到很多附近的请求仓储。缓存仓储可以有很大数量的无人车，而附近的请求仓储只需要1到2个无人车就能处理从缓存的短途请求。
circuit-connectors=回路连接器是读取和写入信号到仓储和运输网络的方式。他们允许使用逻辑条件和网络回路逻辑来控制仓储的行为。
depot-reader=[font=default-bold]运输仓储读取器[/font]允许你读取所连接仓储的数据。\n\n输出模式:\n- [font=default-bold]仓储内容[/font]: 仓储中存储的物品或流体。\n- [font=default-bold]网络供应[/font]: 网络中所有供应仓储的总量。\n- [font=default-bold]网络供应(排除仓储)[/font]: 同上，但排除所连接的仓储。\n\n可启用额外信号: 无人车数量、活跃无人车、燃料、容量和堆叠信息。
depot-writer=[font=default-bold]运输仓储写入器[/font]允许你基于回路/逻辑条件启用和禁用仓储。\n    示例 1：禁用一个请求仓储将会禁止它派遣无人车去收集物品。\n    示例 2：禁用一个供货仓储将会禁止它使自身物品对运输网络可用。
transport-depots=运输仓储是运输网络中协调物品和流体运输的实体。他们管理运输网络中的内容和请求。他们通过'caution'地板连接到运输网络，并且它们是无人车派遣和返回的位置。
network-reader=[font=default-bold]运输网络读取器[/font]能够读取所连接运输网络的内容。打开读取器并在其槽位中设置一个或多个物品/流体信号。读取器将持续更新每个信号在网络中所有供货仓储的总数量。\n\n可以同时监控多个信号--每个槽位独立追踪不同的物品。\n\n例如你可以在运输网络中的矿石低于某个指定值时启用或禁用特定的生产线、启用备用存储。
filtered-reader=[font=default-bold]运输网络读取器（排除仓库）[/font]的功能与标准运输网络读取器相同，但将所连接仓库的库存从总数中排除。\n\n当使用网络供应量来控制供货仓储时，可防止电路反馈回路。例如，如果你想在网络有足够物品时禁用某个仓储，使用此读取器可以不将该仓储自身的物品计入总数。\n\n将其放置在仓储旁边（如同仓储读取器/写入器），方向朝向仓储。

