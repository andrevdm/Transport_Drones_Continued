[mod-setting-description]
transport-depot-update-interval=每个仓储执行更新逻辑的频率（tick数）。较低的值 = 响应更快但UPS消耗更高。默认值：60 tick（1秒）。
fuel-fluid=用作运输无人车燃料的流体。所有燃料仓储必须供应此流体。
fuel-amount-per-drone=每次无人车派遣消耗的燃料量。较高的值会增加每次行程的燃料消耗。
drone-fluid-capacity=燃料无人车每次配送可运输的最大燃料量。
fluid-depot-capacity=流体仓储的最大流体存储容量。容量越大，仓储满载前可派遣的无人机越多。原版储液罐容量为25,000，仅供参考。需要重启。
request-depot-fluid-capacity=请求仓储的流体输出缓冲容量。值越大，连接管道的流体吞吐量越高。原版储液罐容量为25,000，仅供参考。需要重启。
fuel-consumption-per-meter=运输无人车每米消耗的燃料。设为0可禁用燃料消耗。
drone-pollution-per-second=每个活跃无人车每秒排放的污染量。设为0可禁用无人车污染。
transport-drone-pathfinder-max-steps=寻路器每tick最大步数。较高的值可改善无人车路径规划，但会消耗UPS。Factorio默认值：1000。
transport-drone-pathfinder-max-work=寻路器每tick最大工作量。较高的值可改善无人车路径规划，但会消耗UPS。Factorio默认值：8000。
transport-drone-pathfinder-use-cache=启用全局寻路器的路径缓存。禁用可获得更精确但更耗资源的寻路。Factorio默认值：启用。
transport-drone-sound-volume=运输无人车引擎声音的音量（0 = 静音，100 = 默认）。
transport-drones-road-tile-whitelist=以逗号分隔的第三方瓷砖匹配模式，匹配的瓷砖将被视为无人机道路。普通条目匹配物品名称（Lua模式），@前缀条目匹配子组。默认值：^Arci%-,^dect%-concrete%-grid$,@py-tiles。需要重启。
transport-drones-diagonal-check=启用后，无人车不能通过非道路地砖之间的对角线角落。防止通过间隙抄近路。需要重启。
transport-drone-load-balance-threshold=与最佳评分差距在此阈值内的供货仓储被视为同等，随机选择其中一个。在附近仓储间分散负载。设为0则始终选择最佳仓储。
transport-drone-priority-weight=当大于0时，用加权偏差替代绝对优先级系统：优先级×权重。优先级变为可被距离超越的柔性偏好。0 = 绝对优先级（默认行为）。
transport-drone-max-dispatches-per-tick=单个仓储在一次更新周期内最多可派遣的无人车数量。作为安全上限，防止极端情况下的失控派遣。正常游戏中，自然限制（无人车库存、燃料）会在远低于此上限时停止派遣。如果您的超大型基地中每个仓储有数百辆无人车，可以提高此值。
transport-drone-redispatch-interval=有待处理需求的仓储在常规更新周期之间重新尝试派遣的频率（tick数）。较低的值 = 更平滑的无人车生成，但UPS略有增加。默认5 tick = 每秒12次派遣尝试。设为1获得最快响应。
transport-drones-space-platform-roads=允许在太空平台基座上放置道路砖块。如果其他模组需要阻止在太空平台基座上放置砖块，请禁用此选项。需要重启。
active-depot-overfill-percent=主动仓储可以超出请求仓储正常存储上限的百分比。设为25%时，上限为200件物品的请求仓储可以从主动仓储接收最多250件。设为0则严格执行上限。请求仓储自身的无人车仍遵守正常上限。
enable-drone-dispatcher=启用后，无人车分配器建筑可用（通过运输系统研究解锁）。禁用可从游戏中移除分配器。需要重启。
enable-active-depot=启用后，主动仓储建筑可用（通过主动运输研究解锁）。禁用可从游戏中移除主动仓储。需要重启。
enable-storage-depot=启用后，存储仓储建筑可用（通过主动运输研究解锁）。禁用可从游戏中移除存储仓储。需要重启。
enable-multi-pipe=启用后，多管道连接技术可用，解锁流体仓储上的额外东/西管道连接。需要重启。
transport-drone-stack-size=每个库存堆叠的运输无人机数量。影响仓库无人机库存中可容纳的无人机数量。需要重启。
dispatcher-depot-capacity=Maximum fuel storage capacity for the dispatcher depot. Must be large enough to hold fuel for all assigned drones (drone count x fuel per drone). Default: 50,000. Requires restart.

