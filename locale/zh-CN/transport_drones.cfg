[item-description]
transport-drone=在运输网络中的仓储之间运输物品。\n[font=default-bold]品质加成：[/font]\n  速度：+15% 优良，+30% 稀有，+50% 史诗，+80% 传奇。\n  燃料节省：10% 优良，20% 稀有，30% 史诗，45% 传奇。

[entity-description]
request-depot=派遣无人车从运输网络中的供货仓储收集物品。\n[font=default-bold]品质：[/font] 无人车槽位：5/6/7/8/10。
supply-depot=将其库存提供给运输网络。\n[font=default-bold]品质：[/font] 库存：80/100/125/175/250 格。
supply-depot-chest=将其库存提供给运输网络。可选择允许物流机器人取走物品（被动供应者）。\n[font=default-bold]品质：[/font] 库存：80/100/125/175/250 格。
buffer-depot=同时作为请求仓储和供货仓储。\n[font=default-bold]品质：[/font] 无人车槽位：5/6/7/8/10。
fuel-depot=向运输网络中的其他仓储配送燃料。\n[font=default-bold]品质：[/font] 无人车槽位：5/6/7/8/10。
active-depot=主动将库存中的物品推送到运输网络中的请求仓储。无需配方--通过传送带或机械臂投入物品。\n[font=default-bold]品质：[/font] 库存：80/100/125/175/250 格。无人车槽位：5/6/7/8/10。
active-depot-chest=主动仓储的内部存储。投入此处的物品将自动推送到请求仓储。
storage-depot=运输网络的被动仓库。请求仓储像从供应仓储一样取走物品。主动仓储将多余物品推送至此。\n[font=default-bold]品质:[/font] 库存: 80/100/125/175/250 格。
storage-depot-chest=运输网络的被动仓库。请求仓储像从供应仓储一样取走物品。主动仓储将多余物品推送至此。\n[font=default-bold]品质:[/font] 库存: 80/100/125/175/250 格。
fluid-depot=将其流体库存提供给运输网络。
transport-depot-reader=将仓储内容或网络供应作为电路信号输出。使用界面在仓储内容、完整网络供应或排除此仓储的网络供应之间切换。
transport-depot-writer=通过回路或物流条件控制所连接的仓储。也可覆盖请求/缓存仓储的请求数量。从线路读取 [virtual-signal=signal-P] 以覆盖仓储优先级。读取 [virtual-signal=signal-T] 以覆盖供应阈值。
road-network-reader=读取运输网络中所有供货仓储中选定物品的总数量。同时支持多个信号。
road-network-reader-filtered=读取道路网络中的总供应量，但排除所连接仓库的库存。放置在供应仓库或缓冲仓库旁边。防止电路反馈回路。
depot-drone-chest=为此仓储存放运输无人车。槽位数量随仓储品质增长。支持物流机器人配送。
drone-dispatcher=通过机械臂或机器人接收运输无人车。连接到运输网络进行无人车分配。\n[font=default-bold]品质:[/font] 库存: 10/12/14/16/20 格。
drone-dispatcher-chest=通过机械臂或机器人接收运输无人车。连接到运输网络进行无人车分配。\n[font=default-bold]品质:[/font] 库存: 10/12/14/16/20 格。

